<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>原価管理 — SOWAN</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;min-height:100vh}
.topbar{background:#1a1a1a;padding:0 24px;display:flex;align-items:center;height:52px}
.topbar-title{font-size:15px;font-weight:600;color:#fff}
.topbar-sub{font-size:11px;color:#666;margin-left:10px}
.layout{display:grid;grid-template-columns:300px 1fr;height:calc(100vh - 52px)}
/* 左リスト */
.list-col{background:#fff;border-right:1px solid #e8e6e0;overflow-y:auto;display:flex;flex-direction:column}
.list-header{padding:14px 16px;border-bottom:1px solid #f0ede8;position:sticky;top:0;background:#fff;z-index:10}
.list-header-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.05em;margin-bottom:8px}
.search-input{width:100%;padding:7px 10px;border:1px solid #e8e6e0;border-radius:7px;font-size:12px;background:#faf9f7;font-family:inherit}
.search-input:focus{outline:none;border-color:#999}
.prod-item{padding:10px 16px;border-bottom:1px solid #f5f4f0;cursor:pointer;display:flex;align-items:center;gap:10px;transition:background .1s}
.prod-item:hover{background:#faf9f7}
.prod-item.active{background:#f0f4ff;border-left:3px solid #1a5fa0;padding-left:13px}
.rank{font-size:11px;font-weight:700;color:#ccc;width:22px;text-align:right;flex-shrink:0}
.rank.top{color:#b86a00}
.prod-info{flex:1;min-width:0}
.prod-name{font-size:13px;font-weight:600;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.prod-code{font-size:11px;color:#bbb;margin-top:1px}
.prod-right{text-align:right;flex-shrink:0}
.prod-sales{font-size:11px;color:#aaa}
.prod-cost{font-size:12px;font-weight:700;color:#0a6b50}
.no-cost{font-size:11px;color:#e0ddd8}
/* 右フォーム */
.form-col{overflow-y:auto;padding:24px;background:#f5f4f0}
.form-inner{max-width:700px}
.prod-head{margin-bottom:20px}
.prod-head-name{font-size:20px;font-weight:700;margin-bottom:4px}
.prod-head-meta{font-size:12px;color:#aaa}
/* タイプ切替 */
.type-toggle{display:flex;gap:8px;margin-bottom:16px}
.type-btn{padding:6px 18px;border-radius:20px;border:1.5px solid #e8e6e0;font-size:13px;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s}
.type-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
/* セクション */
.section{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:18px 20px;margin-bottom:14px}
.sec-title{font-size:11px;font-weight:700;color:#999;text-transform:uppercase;letter-spacing:.06em;margin-bottom:14px;display:flex;align-items:center;gap:8px}
.sec-title::after{content:'';flex:1;height:1px;background:#f0ede8}
/* 原価サマリー */
.cost-summary{background:#1a1a1a;border-radius:14px;padding:20px 24px;color:#fff;margin-bottom:16px}
.cost-sum-title{font-size:11px;color:#666;margin-bottom:16px;text-transform:uppercase;letter-spacing:.06em}
.cost-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.cost-item label{font-size:11px;color:#666;display:block;margin-bottom:4px}
.cost-amount{font-size:24px;font-weight:700}
.cost-avg .cost-amount{color:#f0a030}
.cost-sub{font-size:10px;color:#555;margin-top:3px;line-height:1.6}
/* 生地テーブル */
.fabric-head{display:grid;grid-template-columns:1fr 80px 70px 70px 90px 28px;gap:8px;font-size:10px;font-weight:700;color:#bbb;text-transform:uppercase;padding:0 0 6px;border-bottom:1px solid #f0ede8;margin-bottom:4px}
.fabric-head span:not(:first-child){text-align:right}
.fabric-row{display:grid;grid-template-columns:1fr 80px 70px 70px 90px 28px;gap:8px;align-items:center;padding:7px 0;border-bottom:1px solid #f8f7f4}
.auto-val{font-size:12px;font-weight:600;color:#1a5fa0;text-align:right}
.auto-val.na{color:#ddd;font-weight:400}
select.fab-sel{font-size:12px;padding:5px 7px;border:1px solid #d8d5cf;border-radius:6px;font-family:inherit;background:#fff;width:100%}
input.num{padding:5px 8px;border:1px solid #d8d5cf;border-radius:6px;font-size:13px;text-align:right;font-family:inherit;width:100%}
input.txt{padding:7px 10px;border:1px solid #d8d5cf;border-radius:7px;font-size:13px;font-family:inherit;width:100%}
input.num:focus,input.txt:focus,select:focus{outline:none;border-color:#999}
.add-row-btn{display:flex;align-items:center;gap:6px;font-size:12px;color:#1a5fa0;cursor:pointer;padding:8px 0;border:none;background:none;font-family:inherit}
/* 色 */
.color-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.color-box{padding:12px 14px;border-radius:8px;border:1px solid #e8e6e0}
.color-label{font-size:11px;font-weight:700;color:#666;margin-bottom:8px;display:flex;align-items:center;gap:6px}
.cdot{width:10px;height:10px;border-radius:50%}
/* 固定費グリッド */
.fixed-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:12px}
.mat-grid{display:grid;grid-template-columns:1fr 100px 1fr 100px;gap:8px;align-items:center}
.field-label{font-size:11px;color:#999;margin-bottom:4px}
/* ボタン */
.btn{padding:8px 20px;border:1px solid #d8d5cf;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;font-family:inherit;transition:all .15s}
.btn:hover{background:#f5f4f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.ghost{background:none;border:none;color:#ccc;cursor:pointer;font-size:16px;font-family:inherit;padding:0;line-height:1}
.btn.ghost:hover{color:#555}
.save-bar{display:flex;gap:8px;justify-content:flex-end;padding-top:4px}
/* 空・ローディング */
.center-msg{display:flex;flex-direction:column;align-items:center;justify-content:center;height:100%;color:#bbb;gap:12px;text-align:center}
.center-msg .icon{font-size:48px;opacity:.3}
.toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#1a1a1a;color:#fff;padding:10px 22px;border-radius:10px;font-size:13px;z-index:400;opacity:0;transition:opacity .25s;pointer-events:none}
.toast.show{opacity:1}
</style>
</head>
<body>

<div class="topbar">
  <div class="topbar-title">💴 原価管理</div>
  <div class="topbar-sub">渋谷さん専用</div>
</div>

<div class="layout">
  <div class="list-col">
    <div class="list-header">
      <div class="list-header-title">売れ筋順（直近6ヶ月）</div>
      <input class="search-input" placeholder="品番・商品名で検索..." oninput="filterList(this.value)">
    </div>
    <div id="prod-list"><div style="padding:20px;color:#bbb;text-align:center">読込中…</div></div>
  </div>
  <div class="form-col" id="form-col">
    <div class="center-msg">
      <div class="icon">💴</div>
      <div style="font-size:15px;font-weight:600;color:#888">商品を選択してください</div>
      <div style="font-size:12px">左のリストから商品を選ぶと<br>原価入力フォームが表示されます</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>

<script>
const SB_URL='https://yukcdqnnevomhdcpsvms.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1a2NkcW5uZXZvbWhkY3Bzdm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mjc2MTUsImV4cCI6MjA5MjAwMzYxNX0.XBSc2kQNwR_bleSwrfYZD8l0fbKTbL1Z3S7ewEtSkDc';
const sb=supabase.createClient(SB_URL,SB_KEY);

let allProducts=[], allFabrics=[], allColors=[], costBases={}, fabricDetails={};
let selectedCode=null, allProds=[];

async function init(){
  // 並行フェッチ
  const [salesRes, itemsRes, fabricRes, colorRes, baseRes, detailRes] = await Promise.all([
    sb.from('monthly_sales').select('code,sales_qty').gte('year_month', getYm6()),
    sb.from('master_products').select('product_code,product_name').order('product_code'),
    sb.from('master_fabrics').select('fabric_code,fabric_name,width_cm,weight_g_m2,unit_price_per_kg').order('fabric_code'),
    sb.from('cost_color_list').select('*').order('color_name'),
    sb.from('product_cost_base').select('*'),
    sb.from('product_fabric_detail').select('*'),
  ]);

  // 販売数集計
  const salesMap={};
  (salesRes.data||[]).forEach(r=>{
    salesMap[r.code]=(salesMap[r.code]||0)+(r.sales_qty||0);
  });

  // 商品リスト（販売数降順）
  const prods=itemsRes.data||[];
  allProds=prods.map(p=>({
    code:p.product_code,
    name:p.product_name||p.product_code,
    sales:salesMap[p.product_code]||0,
  })).sort((a,b)=>b.sales-a.sales);

  allFabrics=fabricRes.data||[];
  allColors=colorRes.data||[];

  // 原価ベースをmap化
  (baseRes.data||[]).forEach(b=>costBases[b.item_code]=b);

  // 生地明細をmap化 {item_code: [{fabric_code, usage_m, id}]}
  (detailRes.data||[]).forEach(d=>{
    if(!fabricDetails[d.item_code])fabricDetails[d.item_code]=[];
    fabricDetails[d.item_code].push({...d});
  });

  renderList(allProds);
}

function getYm6(){
  const d=new Date();d.setMonth(d.getMonth()-6);
  const m=String(d.getMonth()+1).padStart(2,'0');
  return `${d.getFullYear()}-${m}`;
}

// ── リスト描画 ──────────────────────────────
function renderList(list){
  const wrap=document.getElementById('prod-list');
  if(!list.length){wrap.innerHTML='<div style="padding:20px;color:#bbb;text-align:center">該当なし</div>';return;}
  wrap.innerHTML=list.map((p,i)=>{
    const base=costBases[p.code];
    const costHtml=base
      ?`<div class="prod-cost">登録済み</div>`
      :`<div class="no-cost">未設定</div>`;
    return`<div class="prod-item${p.code===selectedCode?' active':''}" onclick="selectProduct('${p.code}')">
      <div class="rank${i<3?' top':''}">${i+1}</div>
      <div class="prod-info">
        <div class="prod-name">${esc(p.name)}</div>
        <div class="prod-code">${esc(p.code)}</div>
      </div>
      <div class="prod-right">
        ${p.sales?`<div class="prod-sales">${p.sales}個</div>`:''}
        ${costHtml}
      </div>
    </div>`;
  }).join('');
}

function filterList(q){
  const filtered=allProds.filter(p=>(p.name+p.code).toLowerCase().includes(q.toLowerCase()));
  renderList(filtered);
}

// ── 商品選択 ──────────────────────────────────
async function selectProduct(code){
  selectedCode=code;
  renderList(allProds);
  renderForm(code);
}

// ── 計算 ──────────────────────────────────────
function calcUsageKg(fabCode, usageM){
  const fab=allFabrics.find(f=>f.fabric_code===fabCode);
  if(!fab||!fab.width_cm||!fab.weight_g_m2||!usageM)return null;
  return usageM*(fab.width_cm/100)*(fab.weight_g_m2/1000);
}

function calcCosts(base, fabRows){
  const cheap=allColors.find(c=>c.color_name===base?.cheap_color);
  const exp  =allColors.find(c=>c.color_name===base?.expensive_color);
  const fixed=(base?.sewing_cost||0)+(base?.cutting_cost||0)+
              (base?.material1_cost||0)+(base?.material2_cost||0)+(base?.material3_cost||0);
  let cheapFab=0,expFab=0;
  fabRows.forEach(row=>{
    const fab=allFabrics.find(f=>f.fabric_code===row.fabric_code);
    const kg=calcUsageKg(row.fabric_code,row.usage_m);
    if(!fab||!kg)return;
    cheapFab+=kg*(fab.unit_price_per_kg||0)+(kg*(cheap?.dyeing_price_per_kg||0));
    expFab  +=kg*(fab.unit_price_per_kg||0)+(kg*(exp?.dyeing_price_per_kg||0));
  });
  return{cheap:Math.round(cheapFab+fixed),exp:Math.round(expFab+fixed),avg:Math.round((cheapFab+expFab)/2+fixed),fixed};
}

// ── フォーム描画 ──────────────────────────────
function renderForm(code){
  const p=allProds.find(x=>x.code===code)||{code,name:code,sales:0};
  const base=costBases[code]||{item_code:code,product_type:'fabric'};
  const fabRows=fabricDetails[code]||[{fabric_code:'',usage_m:0}];
  const cost=calcCosts(base,fabRows);

  const fabOpts=allFabrics.map(f=>{
    const spec=[f.width_cm?`幅${f.width_cm}cm`:'',f.weight_g_m2?`${f.weight_g_m2}g/m²`:'',f.unit_price_per_kg?`¥${f.unit_price_per_kg.toLocaleString()}/kg`:''].filter(Boolean).join('・');
    return`<option value="${esc(f.fabric_code)}">${esc(f.fabric_code)}${spec?'（'+spec+'）':'（単価未設定）'}</option>`;
  }).join('');

  const colOpts=`<option value="">選択</option>`+allColors.map(c=>`<option value="${esc(c.color_name)}">${esc(c.color_name)}（¥${c.dyeing_price_per_kg}/kg）</option>`).join('');

  const fabRowsHtml=fabRows.map((row,i)=>{
    const kg=calcUsageKg(row.fabric_code,row.usage_m);
    const fab=allFabrics.find(f=>f.fabric_code===row.fabric_code);
    const cheapColor=allColors.find(c=>c.color_name===base.cheap_color);
    const rowCheap=kg&&fab?Math.round(kg*((fab.unit_price_per_kg||0)+(cheapColor?.dyeing_price_per_kg||0))):null;
    const rowId=row.id?`data-id="${row.id}"`:'';
    return`<div class="fabric-row" ${rowId}>
      <select class="fab-sel" onchange="onFabChange(${i},this.value)">
        <option value="">生地を選択</option>
        ${fabOpts.replace(`value="${esc(row.fabric_code)}"`,`value="${esc(row.fabric_code)}" selected`)}
      </select>
      <input class="num" type="number" step="0.01" value="${row.usage_m||''}" placeholder="0.00"
        onchange="onUsageChange(${i},parseFloat(this.value)||0)" style="width:100%">
      <div class="auto-val${kg?'':' na'}">${kg?kg.toFixed(3)+'kg':'—'}</div>
      <div class="auto-val${fab?.unit_price_per_kg?'':' na'}" style="font-size:11px;color:#aaa">
        ${fab?.unit_price_per_kg?'¥'+fab.unit_price_per_kg.toLocaleString():'—'}
      </div>
      <div class="auto-val${rowCheap?'':' na'}">${rowCheap?'¥'+rowCheap.toLocaleString():'—'}</div>
      <button class="btn ghost" onclick="removeFabRow(${i})">×</button>
    </div>`;
  }).join('');

  document.getElementById('form-col').innerHTML=`
  <div class="form-inner">
    <div class="prod-head">
      <div class="prod-head-name">${esc(p.name)}</div>
      <div class="prod-head-meta">${esc(p.code)}　／　直近6ヶ月合計 ${p.sales}個</div>
    </div>

    <div class="cost-summary">
      <div class="cost-sum-title">原価サマリー（自動計算）</div>
      <div class="cost-grid">
        <div class="cost-item">
          <label>安値原価</label>
          <div class="cost-amount">${cost.cheap?'¥'+cost.cheap.toLocaleString():'—'}</div>
          <div class="cost-sub">${base.cheap_color||'色未設定'}</div>
        </div>
        <div class="cost-item">
          <label>高値原価</label>
          <div class="cost-amount">${cost.exp?'¥'+cost.exp.toLocaleString():'—'}</div>
          <div class="cost-sub">${base.expensive_color||'色未設定'}</div>
        </div>
        <div class="cost-item cost-avg">
          <label>平均原価</label>
          <div class="cost-amount">${cost.avg?'¥'+cost.avg.toLocaleString():'—'}</div>
          <div class="cost-sub">固定費 ¥${cost.fixed.toLocaleString()}</div>
        </div>
      </div>
    </div>

    <div class="type-toggle">
      <button class="type-btn${base.product_type!=='knit'?' active':''}" onclick="setType('fabric')">🧵 生地系</button>
      <button class="type-btn${base.product_type==='knit'?' active':''}" onclick="setType('knit')">🧦 靴下系（準備中）</button>
    </div>

    <div class="section">
      <div class="sec-title">染色パターン</div>
      <div class="color-grid">
        <div class="color-box">
          <div class="color-label"><div class="cdot" style="background:#2cb67d"></div>安値色</div>
          <select style="width:100%;padding:7px 10px;border:1px solid #d8d5cf;border-radius:7px;font-size:13px;font-family:inherit" onchange="onBaseChange('cheap_color',this.value)">
            ${colOpts.replace(`value="${esc(base.cheap_color||'')}"`,`value="${esc(base.cheap_color||'')}" selected`)}
          </select>
        </div>
        <div class="color-box">
          <div class="color-label"><div class="cdot" style="background:#e05252"></div>高値色</div>
          <select style="width:100%;padding:7px 10px;border:1px solid #d8d5cf;border-radius:7px;font-size:13px;font-family:inherit" onchange="onBaseChange('expensive_color',this.value)">
            ${colOpts.replace(`value="${esc(base.expensive_color||'')}"`,`value="${esc(base.expensive_color||'')}" selected`)}
          </select>
        </div>
      </div>
    </div>

    <div class="section">
      <div class="sec-title">使用生地・使用量</div>
      <div class="fabric-head"><span>生地品番</span><span>使用量(m)</span><span>重量(kg)</span><span>生地単価</span><span>生地+染色代</span><span></span></div>
      ${fabRowsHtml}
      <button class="add-row-btn" onclick="addFabRow()">＋ 生地を追加</button>
    </div>

    <div class="section">
      <div class="sec-title">固定費（1点あたり）</div>
      <div class="fixed-grid">
        <div>
          <div class="field-label">縫製代（円）</div>
          <input class="num" type="number" value="${base.sewing_cost||''}" placeholder="0" onchange="onBaseChange('sewing_cost',parseFloat(this.value)||0)" style="width:100%">
        </div>
        <div>
          <div class="field-label">裁断代（円）</div>
          <input class="num" type="number" value="${base.cutting_cost||''}" placeholder="0" onchange="onBaseChange('cutting_cost',parseFloat(this.value)||0)" style="width:100%">
        </div>
      </div>
      <div class="mat-grid">
        <div>
          <div class="field-label">資材①名称</div>
          <input class="txt" type="text" value="${base.material1_name||''}" placeholder="例: ゴム" onchange="onBaseChange('material1_name',this.value)">
        </div>
        <div>
          <div class="field-label">金額（円）</div>
          <input class="num" type="number" value="${base.material1_cost||''}" placeholder="0" onchange="onBaseChange('material1_cost',parseFloat(this.value)||0)" style="width:100%">
        </div>
        <div>
          <div class="field-label">資材②名称</div>
          <input class="txt" type="text" value="${base.material2_name||''}" placeholder="例: ボタン" onchange="onBaseChange('material2_name',this.value)">
        </div>
        <div>
          <div class="field-label">金額（円）</div>
          <input class="num" type="number" value="${base.material2_cost||''}" placeholder="0" onchange="onBaseChange('material2_cost',parseFloat(this.value)||0)" style="width:100%">
        </div>
      </div>
    </div>

    <div class="save-bar">
      <button class="btn primary" onclick="saveAll()">💾 保存する</button>
    </div>
  </div>`;
}

// ── イベントハンドラ ──────────────────────────
function onBaseChange(field,val){
  if(!selectedCode)return;
  if(!costBases[selectedCode])costBases[selectedCode]={item_code:selectedCode,product_type:'fabric'};
  costBases[selectedCode][field]=val;
  renderForm(selectedCode);
}

function onFabChange(i,val){
  if(!selectedCode)return;
  if(!fabricDetails[selectedCode])fabricDetails[selectedCode]=[{fabric_code:'',usage_m:0}];
  fabricDetails[selectedCode][i].fabric_code=val;
  renderForm(selectedCode);
}

function onUsageChange(i,val){
  if(!selectedCode)return;
  if(!fabricDetails[selectedCode])fabricDetails[selectedCode]=[{fabric_code:'',usage_m:0}];
  fabricDetails[selectedCode][i].usage_m=val;
  renderForm(selectedCode);
}

function addFabRow(){
  if(!selectedCode)return;
  if(!fabricDetails[selectedCode])fabricDetails[selectedCode]=[];
  fabricDetails[selectedCode].push({fabric_code:'',usage_m:0});
  renderForm(selectedCode);
}

function removeFabRow(i){
  if(!selectedCode)return;
  const rows=fabricDetails[selectedCode]||[];
  rows.splice(i,1);
  if(!rows.length)rows.push({fabric_code:'',usage_m:0});
  fabricDetails[selectedCode]=rows;
  renderForm(selectedCode);
}

function setType(t){
  if(!selectedCode)return;
  if(!costBases[selectedCode])costBases[selectedCode]={item_code:selectedCode,product_type:t};
  costBases[selectedCode].product_type=t;
  renderForm(selectedCode);
}

// ── 保存 ──────────────────────────────────────
async function saveAll(){
  if(!selectedCode)return;
  const base=costBases[selectedCode]||{};
  const rows=(fabricDetails[selectedCode]||[]).filter(r=>r.fabric_code);

  // product_cost_base: upsert
  const basePayload={...base,item_code:selectedCode,updated_at:new Date().toISOString()};
  const{error:e1}=await sb.from('product_cost_base').upsert(basePayload,{onConflict:'item_code'});
  if(e1){toast('保存エラー: '+e1.message);return;}

  // product_fabric_detail: 既存削除→再insert
  await sb.from('product_fabric_detail').delete().eq('item_code',selectedCode);
  if(rows.length){
    const{error:e2}=await sb.from('product_fabric_detail').insert(
      rows.map(r=>({item_code:selectedCode,fabric_code:r.fabric_code,usage_m:r.usage_m}))
    );
    if(e2){toast('生地明細保存エラー: '+e2.message);return;}
  }

  // ローカル更新
  costBases[selectedCode]=basePayload;
  fabricDetails[selectedCode]=rows;
  renderList(allProds);
  toast('✓ 保存しました');
}

// ── ユーティリティ ──────────────────────────
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

let toastTimer=null;
function toast(msg){
  const el=document.getElementById('toast');
  el.textContent=msg;el.classList.add('show');
  if(toastTimer)clearTimeout(toastTimer);
  toastTimer=setTimeout(()=>el.classList.remove('show'),2500);
}

init();
</script>
</body>
</html>

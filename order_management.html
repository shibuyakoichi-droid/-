<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>発注管理 — mofmofu</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN','Hiragino Sans',Meiryo,sans-serif;font-size:14px;color:#1a1a1a;background:#f5f4f0;min-height:100vh}
.topbar{background:#fff;border-bottom:1px solid #e8e6e0;padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600;letter-spacing:.02em}
.topbar-sub{font-size:11px;color:#888;margin-top:2px}
.container{max-width:980px;margin:0 auto;padding:24px 20px}
.tabs{display:flex;gap:2px;background:#e8e6e0;border-radius:8px;padding:3px;margin-bottom:24px;width:fit-content}
.tab{padding:7px 18px;font-size:13px;cursor:pointer;border:none;background:none;color:#666;border-radius:6px;font-family:inherit}
.tab.active{background:#fff;color:#1a1a1a;font-weight:500;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.panel{display:none}.panel.active{display:block}
.section-label{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
.card{background:#fff;border:1px solid #e8e6e0;border-radius:12px;padding:20px}
.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:24px}
.stat{background:#fff;border:1px solid #e8e6e0;border-radius:10px;padding:16px}
.stat-label{font-size:11px;color:#999;margin-bottom:6px}
.stat-value{font-size:26px;font-weight:600;color:#1a1a1a;line-height:1}
.stat-unit{font-size:12px;color:#999;margin-top:4px}
.month-chip{display:inline-block;background:#f0ede8;color:#555;font-size:12px;font-weight:600;padding:4px 12px;border-radius:20px;margin-bottom:12px}
.table-wrap{background:#fff;border:1px solid #e8e6e0;border-radius:12px;overflow:hidden;margin-bottom:16px}
table.list{width:100%;border-collapse:collapse}
table.list th{font-size:11px;font-weight:600;color:#999;text-transform:uppercase;letter-spacing:.05em;padding:10px 14px;border-bottom:1px solid #e8e6e0;text-align:left;background:#faf9f7;white-space:nowrap}
table.list th.sortable{cursor:pointer;user-select:none}
table.list th.sortable:hover{color:#555}
table.list td{padding:10px 14px;border-bottom:1px solid #f0ede8;font-size:13px;vertical-align:middle}
table.list tr:last-child td{border-bottom:none}
table.list tr:hover td{background:#faf9f7}
.sort-arrow{font-size:10px;margin-left:3px;color:#bbb}
.sort-arrow.active{color:#555}
.badge{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-knit{background:#e1f5ee;color:#0a6b50}
.badge-dye{background:#faeeda;color:#7a4d0a}
.badge-cut{background:#e6f1fb;color:#1a5fa0}
.badge-sew{background:#fbeaf0;color:#8a2244}
.badge-other{background:#f0ede8;color:#555}
.badge-yarn{background:#f3eafd;color:#6b2fa0}
.badge-socks{background:#fde8f0;color:#a02060}
.btn{padding:8px 18px;border:1px solid #d8d5cf;border-radius:8px;font-size:13px;cursor:pointer;background:#fff;color:#1a1a1a;font-family:inherit;transition:background .15s}
.btn:hover{background:#f5f4f0}
.btn.primary{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.btn.primary:hover{background:#333}
.btn.danger{color:#a32d2d;border-color:#f0c0c0}
.btn.danger:hover{background:#fcebeb}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.active-filter{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.filter-bar{display:flex;gap:8px;align-items:center;margin-bottom:14px;flex-wrap:wrap}
.filter-bar select{width:auto;padding:6px 10px;font-size:12px}
.filter-bar label{font-size:12px;color:#888}
.filter-bar input{width:auto;padding:6px 10px;font-size:12px}
.form-row{display:grid;gap:10px;margin-bottom:12px}
.form-row.col2{grid-template-columns:1fr 1fr}
.form-row.col3{grid-template-columns:1fr 1fr 1fr}
.form-group label{display:block;font-size:12px;font-weight:500;color:#666;margin-bottom:4px}
input,select,textarea{width:100%;padding:8px 10px;border:1px solid #d8d5cf;border-radius:7px;font-size:13px;background:#fff;color:#1a1a1a;font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#999;box-shadow:0 0 0 3px rgba(0,0,0,.05)}
input[readonly]{background:#f5f4f0;color:#888}
.empty-state{text-align:center;padding:40px 0;color:#aaa;font-size:13px}
.month-section{margin-bottom:28px}
.month-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.month-title{font-size:14px;font-weight:600}
.month-summary{font-size:12px;color:#999}
.alert{padding:10px 16px;border-radius:8px;font-size:13px;margin-bottom:16px}
.alert-ok{background:#eaf3de;color:#3a6d10;border:1px solid #b8d98a}
.alert-err{background:#fcebeb;color:#a32d2d;border:1px solid #f0c0c0}
.subtabs{display:flex;gap:4px;margin-bottom:16px}
.subtab{padding:5px 14px;font-size:12px;cursor:pointer;border:1px solid #d8d5cf;border-radius:6px;background:#fff;color:#666;font-family:inherit}
.subtab.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a}
.modal-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:200;align-items:center;justify-content:center}
.modal-overlay.open{display:flex}
.modal{background:#fff;border-radius:16px;padding:24px;width:100%;max-width:700px;max-height:90vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px}
.modal-title{font-size:16px;font-weight:600}
.process-tag{display:inline-flex;align-items:center;padding:3px 12px;border-radius:20px;font-size:12px;font-weight:600;margin-left:10px}
.items-tbl{width:100%;border-collapse:collapse;margin-bottom:6px;table-layout:fixed}
.items-tbl th{font-size:11px;color:#999;font-weight:600;text-align:left;padding:5px 6px;border-bottom:1px solid #e8e6e0;white-space:nowrap}
.items-tbl td{padding:4px 4px;border-bottom:1px solid #f0ede8;vertical-align:middle}
.items-tbl td input{padding:5px 6px;font-size:12px;width:100%}
.add-row-btn{background:none;border:none;font-size:12px;color:#999;cursor:pointer;padding:4px 6px;font-family:inherit}
.add-row-btn:hover{color:#1a1a1a}
.loc-self{display:inline-flex;align-items:center;font-size:12px;color:#888;background:#f5f4f0;padding:3px 9px;border-radius:20px}
.loc-est{font-size:10px;color:#bbb;margin-left:4px}
@media print{
  .topbar,.tabs,.no-print,
  .modal-overlay,#alert-area,.container{display:none!important}
  .print-doc{display:block!important;position:static}
}
.print-doc{display:none}
</style>
</head>
<body>

<div class="topbar no-print">
  <div>
    <div class="topbar-title">発注管理</div>
    <div class="topbar-sub">株式会社エル・アイ・シー / mofmofu</div>
  </div>
  <button class="btn primary" onclick="openNewOrder()">＋ 新規発注書</button>
</div>

<div class="container no-print">
  <div id="alert-area"></div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('dashboard')">概要</button>
    <button class="tab" onclick="switchTab('history')">発注履歴</button>
    <button class="tab" onclick="switchTab('analytics')">集計</button>
    <button class="tab" onclick="switchTab('locations')">在処管理</button>
    <button class="tab" onclick="switchTab('factories')">工場マスタ</button>
  </div>

  <div class="panel active" id="tab-dashboard">
    <div id="stats-area"></div>
    <div class="section-label">今月の発注一覧</div>
    <div id="recent-orders"></div>
  </div>

  <div class="panel" id="tab-history">
    <div class="filter-bar">
      <label>表示：</label>
      <button class="subtab active" onclick="setHistoryView('month')">月別</button>
      <button class="subtab" onclick="setHistoryView('factory')">工場別</button>
      <button class="subtab" onclick="setHistoryView('fabric')">品番別</button>
      <label style="margin-left:8px">絞り込み：</label>
      <select id="hist-filter-month" onchange="renderHistory()">
        <option value="">全期間</option>
      </select>
      <select id="hist-filter-factory" onchange="renderHistory()">
        <option value="">全工場</option>
      </select>
    </div>
    <div id="history-area"></div>
  </div>

  <div class="panel" id="tab-analytics">
    <div class="filter-bar">
      <label>期間：</label>
      <select id="ana-filter-month" onchange="renderAnalytics()">
        <option value="">全期間</option>
      </select>
    </div>
    <div class="subtabs">
      <button class="subtab active" onclick="setAnalyticsView('factory')">工場別</button>
      <button class="subtab" onclick="setAnalyticsView('fabric')">品番別</button>
    </div>
    <div id="analytics-area"></div>
  </div>

  <div class="panel" id="tab-locations">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px">
      <div class="subtabs" style="margin-bottom:0">
        <button class="subtab active" onclick="setLocView('list')">一覧</button>
        <button class="subtab" onclick="setLocView('factory')">工場別</button>
      </div>
      <button class="btn primary sm" onclick="toggleLocForm()">＋ 新規登録</button>
    </div>

    <div id="loc-add-form" style="display:none;margin-bottom:16px">
      <div class="card">
        <div class="section-label" style="margin-bottom:12px">生地を直接登録</div>
        <div class="form-row col3">
          <div class="form-group"><label>生地番号 *</label><input id="lf-fabricno" placeholder="例：K-2301"></div>
          <div class="form-group"><label>カラー名</label><input id="lf-color" placeholder="例：ネイビー"></div>
          <div class="form-group"><label>数量（反）</label><input type="number" id="lf-qty" min="0" placeholder="0"></div>
        </div>
        <div class="form-row col2">
          <div class="form-group">
            <label>現在地</label>
            <select id="lf-factory">
              <option value="">自社保管</option>
            </select>
          </div>
          <div class="form-group"><label>メモ</label><input id="lf-memo" placeholder="任意"></div>
        </div>
        <div style="display:flex;justify-content:flex-end;gap:8px">
          <button class="btn" onclick="toggleLocForm()">キャンセル</button>
          <button class="btn primary" onclick="addLocDirect()">登録する</button>
        </div>
      </div>
    </div>

    <div class="filter-bar" id="loc-filter-bar">
      <label>工場：</label>
      <select id="loc-filter-factory" onchange="renderLocations()">
        <option value="">すべて</option>
        <option value="__self__">自社保管のみ</option>
      </select>
      <label>生地番号：</label>
      <select id="loc-filter-fabric" onchange="renderLocations()" style="width:140px">
        <option value="">すべて</option>
      </select>
      <label>検索：</label>
      <input id="loc-search" placeholder="カラー名" style="width:140px" oninput="renderLocations()">
    </div>
    <div id="location-area"></div>
  </div>

  <div class="panel" id="tab-factories">
    <div class="card" style="margin-bottom:16px">
      <div class="section-label" style="margin-bottom:12px">工場を追加</div>
      <div class="form-row col2">
        <div class="form-group"><label>工場名</label><input id="f-name" placeholder="例：坂本繊維"></div>
        <div class="form-group"><label>カテゴリ</label>
          <select id="f-cat">
            <option value="編み">編み</option>
            <option value="染色">染色</option>
            <option value="裁断">裁断</option>
            <option value="縫製">縫製</option>
            <option value="糸">糸</option>
            <option value="靴下">靴下</option>
            <option value="その他">その他</option>
          </select>
        </div>
      </div>
      <div style="text-align:right"><button class="btn primary" onclick="addFactory()">追加する</button></div>
    </div>
    <div id="factory-list"></div>
  </div>
</div>

<!-- 発注書モーダル -->
<div class="modal-overlay no-print" id="order-modal">
  <div class="modal">
    <div class="modal-header">
      <div style="display:flex;align-items:center">
        <div class="modal-title">新規発注書</div>
        <span id="process-tag"></span>
      </div>
      <button class="btn sm" onclick="closeModal()">閉じる</button>
    </div>
    <div style="margin-bottom:10px">
      <div style="font-size:11px;font-weight:600;color:#999;margin-bottom:6px">工程で絞り込み</div>
      <div id="o-cat-filters" style="display:flex;gap:4px;flex-wrap:wrap">
        <button class="subtab active" onclick="filterOrderFactory('')">すべて</button>
        <button class="subtab" onclick="filterOrderFactory('編み')">編み</button>
        <button class="subtab" onclick="filterOrderFactory('染色')">染色</button>
        <button class="subtab" onclick="filterOrderFactory('裁断')">裁断</button>
        <button class="subtab" onclick="filterOrderFactory('縫製')">縫製</button>
        <button class="subtab" onclick="filterOrderFactory('糸')">糸</button>
        <button class="subtab" onclick="filterOrderFactory('靴下')">靴下</button>
        <button class="subtab" onclick="filterOrderFactory('その他')">その他</button>
      </div>
    </div>
    <div class="form-row col2">
      <div class="form-group">
        <label>発注先工場 *</label>
        <select id="o-factory" onchange="onFactoryChange()"><option value="">選択してください</option></select>
        <div id="o-factory-badge" style="margin-top:6px;min-height:22px"></div>
      </div>
      <div class="form-group"><label>発注日 *</label><input type="date" id="o-date"></div>
    </div>
    <div class="form-row col2">
      <div class="form-group"><label>希望納期</label><input type="date" id="o-due"></div>
      <div class="form-group"><label>発注番号（自動）</label><input id="o-number" readonly></div>
    </div>
    <div class="form-row">
      <div class="form-group"><label>備考</label><textarea id="o-memo" rows="2" placeholder="特記事項など"></textarea></div>
    </div>
    <div style="margin-bottom:12px">
      <div class="section-label" style="margin-bottom:8px">発注明細</div>
      <div id="items-hint" style="font-size:12px;color:#bbb;padding:16px 0">工場を選択すると工程に合わせた項目が表示されます</div>
      <table class="items-tbl" id="items-table" style="display:none">
        <thead id="items-head"></thead>
        <tbody id="items-body"></tbody>
      </table>
      <button class="add-row-btn" id="add-row-btn" style="display:none" onclick="addItemRow()">＋ 行を追加</button>
    </div>
    <div style="margin-top:16px;border-top:1px solid #e8e6e0;padding-top:16px">
      <div class="section-label" style="margin-bottom:8px">この発注で移動する生地（任意）</div>
      <div id="order-move-area"><div style="font-size:12px;color:#bbb;padding:8px 0">工場を選択すると生地一覧が表示されます</div></div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:16px;border-top:1px solid #e8e6e0;margin-top:16px">
      <button class="btn" onclick="closeModal()">キャンセル</button>
      <button class="btn primary" onclick="saveOrder()">保存する</button>
    </div>
  </div>
</div>

<!-- 在処移動モーダル -->
<div class="modal-overlay no-print" id="move-modal">
  <div class="modal" style="max-width:440px">
    <div class="modal-header">
      <div class="modal-title">生地を移動</div>
      <button class="btn sm" onclick="closeMoveModal()">閉じる</button>
    </div>
    <div id="move-modal-info" style="margin-bottom:18px;padding:12px 14px;background:#f5f4f0;border-radius:8px;font-size:13px"></div>
    <div class="form-row col2">
      <div class="form-group">
        <label>移動先</label>
        <select id="move-factory" onchange="updateMoveAfter()">
          <option value="">自社保管（工場なし）</option>
        </select>
      </div>
      <div class="form-group">
        <label>移動する数量（反）</label>
        <input type="number" id="move-quantity" min="1" placeholder="0" oninput="updateMoveAfter()">
      </div>
    </div>
    <div id="move-after-area" style="margin-bottom:10px;font-size:13px;color:#888;min-height:20px"></div>
    <div class="form-row">
      <div class="form-group">
        <label>メモ（任意）</label>
        <input id="move-memo" placeholder="例：検反済み、納品予定など">
      </div>
    </div>
    <div style="display:flex;justify-content:flex-end;gap:8px;padding-top:16px;border-top:1px solid #e8e6e0">
      <button class="btn" onclick="closeMoveModal()">キャンセル</button>
      <button class="btn primary" onclick="confirmMove()">移動する</button>
    </div>
  </div>
</div>

<div class="print-doc" id="print-content"></div>

<script>

let orderCatFilter='';
let moveSectionFilter='';

const LS_LOC_KEY='mofmofu_fabric_locations';
let locStorageMode=false;

async function load(){
  const[r1,r2]=await Promise.all([
    sb.from('om_orders').select('*').order('date',{ascending:false}),
    sb.from('factories').select('*').order('name'),
  ]);
  if(r1.error||r2.error){showAlert('データ読み込みに失敗しました','err');return;}
  D.orders=(r1.data||[]).map(o=>({...o,factoryId:o.factory_id,createdAt:o.created_at}));
  D.factories=(r2.data||[]).map(f=>({...f,category:PROCESS_TO_CAT[f.process]||f.category||'その他'}));
  if(!D.factories.length){await seedFactories();}
  const r3=await sb.from('fabric_locations').select('*');
  if(r3.error){
    locStorageMode=true;
    try{D.locations=JSON.parse(localStorage.getItem(LS_LOC_KEY)||'[]');}catch{D.locations=[];}
  }else{
    locStorageMode=false;
    D.locations=r3.data||[];
    const ls=JSON.parse(localStorage.getItem(LS_LOC_KEY)||'[]');
    if(ls.length&&!r3.data?.length){
      for(const rec of ls){await sb.from('fabric_locations').upsert(rec,{onConflict:'fabric_no,color'});}
      localStorage.removeItem(LS_LOC_KEY);
      const r4=await sb.from('fabric_locations').select('*');
      D.locations=r4.data||[];
    }
  }
}
async function seedFactories(){
  const defaults=[
    {id:'f1',name:'坂本繊維',process:'knit',unit:'kg'},
    {id:'f2',name:'V-TEC',process:'dye',unit:'kg'},
    {id:'f3',name:'松田染工場',process:'dye',unit:'kg'},
    {id:'f4',name:'神共ニット',process:'cut',unit:'枚'},
    {id:'f5',name:'コンセプト',process:'sew',unit:'枚'},
    {id:'f6',name:'メリット',process:'sew',unit:'枚'},
  ];
  const{error}=await sb.from('factories').insert(defaults);
  if(!error)D.factories=defaults.map(f=>({...f,category:PROCESS_TO_CAT[f.process]||'その他'}));
}

function genId(){return 'o'+Date.now()+'_'+Math.random().toString(36).slice(2,6)}
function genNumber(){
  const d=new Date(),y=d.getFullYear(),m=String(d.getMonth()+1).padStart(2,'0');
  const n=D.orders.filter(o=>o.date&&o.date.startsWith(y+'-'+m)).length+1;
  return `PO-${y}${m}-${String(n).padStart(3,'0')}`;
}
function getYM(s){return s?s.substring(0,7):''}
function formatYM(ym){if(!ym)return '';const[y,m]=ym.split('-');return `${y}年${parseInt(m)}月`;}
function catBadge(cat){return `<span class="badge badge-${CAT_BADGE[cat]||'other'}">${cat||'—'}</span>`;}
function getCat(order){
  const f=D.factories.find(f=>f.id===order.factoryId);
  return f?f.category:(order.category||'その他');
}
function sumQty(order){
  const qk=QTY_KEY[getCat(order)]||'qty';
  return (order.items||[]).reduce((s,i)=>s+(parseInt(i[qk])||0),0);
}
function getFactoryName(order){
  const f=D.factories.find(f=>f.id===order.factoryId);
  return f?f.name:'不明';
}
function esc(s){
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function buildMonthOptions(selId){
  const sel=document.getElementById(selId);
  const cur=sel.value;
  const months=[...new Set(D.orders.map(o=>getYM(o.date)).filter(Boolean))].sort().reverse();
  sel.innerHTML='<option value="">全期間</option>'+months.map(m=>`<option value="${m}"${m===cur?' selected':''}>${formatYM(m)}</option>`).join('');
}
function buildFactoryOptions(selId){
  const sel=document.getElementById(selId);
  const cur=sel.value;
  sel.innerHTML='<option value="">全工場</option>'+D.factories.map(f=>`<option value="${f.id}"${f.id===cur?' selected':''}>${f.name}</option>`).join('');
}

function switchTab(t){
  document.querySelectorAll('.tab').forEach(el=>el.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(el=>el.classList.remove('active'));
  ['dashboard','history','analytics','locations','factories'].forEach((n,i)=>{
    if(n===t){document.querySelectorAll('.tab')[i].classList.add('active');document.getElementById('tab-'+n).classList.add('active');}
  });
  if(t==='dashboard')renderDashboard();
  if(t==='history'){buildMonthOptions('hist-filter-month');buildFactoryOptions('hist-filter-factory');renderHistory();}
  if(t==='analytics'){buildMonthOptions('ana-filter-month');renderAnalytics();}
  if(t==='locations'){buildLocFilterFactory();buildLocFilterFabric();locView='list';document.querySelectorAll('#tab-locations .subtab').forEach((el,i)=>el.classList.toggle('active',i===0));renderLocations();}
  if(t==='factories')renderFactories();
}

      const f=D.factories.find(f=>f.id===o.factoryId);

        <td style="color:#888">${o.date}</td>

function setHistoryView(v){
  historyView=v;
  histSort={col:'date',dir:'desc'};
  document.querySelectorAll('#tab-history .subtab').forEach((el,i)=>el.classList.toggle('active',['month','factory','fabric'][i]===v));
  renderHistory();
}
function sortHistory(col){
  if(histSort.col===col){histSort.dir=histSort.dir==='asc'?'desc':'asc';}
  else{histSort={col,dir:'asc'};}
  renderHistory();
}
function arrowHtml(col){
  const a=histSort.col===col?(histSort.dir==='asc'?'▲':'▼'):'▲';
  return `<span class="sort-arrow${histSort.col===col?' active':''}">${a}</span>`;
}

function getFilteredOrders(){
  let orders=[...D.orders];
  const fm=document.getElementById('hist-filter-month')?.value||'';
  const ff=document.getElementById('hist-filter-factory')?.value||'';
  if(fm)orders=orders.filter(o=>getYM(o.date)===fm);
  if(ff)orders=orders.filter(o=>o.factoryId===ff);
  return orders;
}
function sortOrders(orders){
  return orders.sort((a,b)=>{
    let va,vb;
    if(histSort.col==='date'){va=a.date;vb=b.date;}
    else if(histSort.col==='factory'){va=getFactoryName(a);vb=getFactoryName(b);}
    else if(histSort.col==='category'){va=getCat(a);vb=getCat(b);}
    else if(histSort.col==='qty'){va=sumQty(a);vb=sumQty(b);}
    else if(histSort.col==='number'){va=a.number;vb=b.number;}
    else{va=a.date;vb=b.date;}
    const cmp=typeof va==='number'?va-vb:String(va||'').localeCompare(String(vb||''),'ja');
    return histSort.dir==='asc'?cmp:-cmp;
  });
}

function renderHistory(){
  const el=document.getElementById('history-area');
  const allOrders=getFilteredOrders();
  if(!allOrders.length){el.innerHTML='<div class="empty-state">発注履歴がありません</div>';return;}

  const orderRow=o=>{
    const f=D.factories.find(f=>f.id===o.factoryId);
    return `<tr>
      <td style="color:#888">${o.date}</td>
      <td style="font-weight:500">${f?f.name:'不明'}</td>
      <td>${f?catBadge(f.category):''}</td>
      <td style="font-size:12px;color:#888;font-family:monospace">${o.number}</td>
      <td style="font-weight:500;text-align:right">${sumQty(o).toLocaleString()}</td>
      <td><button class="btn sm" onclick="printOrder('${o.id}')">印刷</button></td>
    </tr>`;
  };
  const thead=`<thead><tr>
    <th class="sortable" onclick="sortHistory('date')">発注日${arrowHtml('date')}</th>
    <th class="sortable" onclick="sortHistory('factory')">工場${arrowHtml('factory')}</th>
    <th class="sortable" onclick="sortHistory('category')">工程${arrowHtml('category')}</th>
    <th class="sortable" onclick="sortHistory('number')">発注番号${arrowHtml('number')}</th>
    <th class="sortable" onclick="sortHistory('qty')" style="text-align:right">数量計${arrowHtml('qty')}</th>
    <th></th>
  </tr></thead>`;

  if(historyView==='month'){
    const byMonth={};
    allOrders.forEach(o=>{const k=getYM(o.date);if(!byMonth[k])byMonth[k]=[];byMonth[k].push(o);});
    const monthKeys=Object.keys(byMonth).sort().reverse();
    el.innerHTML=monthKeys.map(k=>{
      const orders=sortOrders(byMonth[k]);
      const totalQty=orders.reduce((s,o)=>s+sumQty(o),0);
      return `<div class="month-section">
        <div class="month-header">
          <div class="month-title">${formatYM(k)}</div>
          <div class="month-summary">${orders.length}件 ／ 累計 ${totalQty.toLocaleString()}</div>
        </div>
        <div class="table-wrap"><table class="list">${thead}<tbody>${orders.map(orderRow).join('')}</tbody></table></div>
      </div>`;
    }).join('');

  } else if(historyView==='factory'){
    const byFactory={};
    allOrders.forEach(o=>{const k=o.factoryId||'unknown';if(!byFactory[k])byFactory[k]=[];byFactory[k].push(o);});
    el.innerHTML=Object.entries(byFactory).map(([fid,orders])=>{
      const f=D.factories.find(f=>f.id===fid);
      const sorted=sortOrders(orders);
      const totalQty=sorted.reduce((s,o)=>s+sumQty(o),0);
      return `<div class="month-section">
        <div class="month-header">
          <div class="month-title">${f?f.name:'不明'} ${f?catBadge(f.category):''}</div>
          <div class="month-summary">${sorted.length}件 ／ 累計 ${totalQty.toLocaleString()}</div>
        </div>
        <div class="table-wrap"><table class="list">${thead}<tbody>${sorted.map(orderRow).join('')}</tbody></table></div>
      </div>`;
    }).join('');

  } else if(historyView==='fabric'){
    const byFabric={};
    allOrders.forEach(o=>{
      (o.items||[]).forEach(item=>{
        const k=item.fabricNo||'（品番なし）';
        if(!byFabric[k])byFabric[k]=[];
        byFabric[k].push({order:o,item});
      });
    });
    const fabricKeys=Object.keys(byFabric).sort();
    el.innerHTML=fabricKeys.map(fn=>{
      const rows=byFabric[fn];
      const cat=rows[0]?getCat(rows[0].order):'その他';
      const qk=QTY_KEY[cat]||'qty';
      const totalQty=rows.reduce((s,r)=>s+(parseInt(r.item[qk])||0),0);
      const rowHtml=rows.map(({order:o,item:i})=>{
        const f=D.factories.find(f=>f.id===o.factoryId);
        const qv=parseInt(i[qk])||0;
        return `<tr>
          <td style="color:#888">${o.date}</td>
          <td style="font-weight:500">${f?f.name:'不明'}</td>
          <td>${i.color||'—'}</td>
          <td>${i.productName||'—'}</td>
          <td style="text-align:right;font-weight:500">${qv.toLocaleString()}</td>
          <td><button class="btn sm" onclick="printOrder('${o.id}')">印刷</button></td>
        </tr>`;
      }).join('');
      return `<div class="month-section">
        <div class="month-header">
          <div class="month-title" style="font-family:monospace">${fn}</div>
          <div class="month-summary">${rows.length}明細 ／ 累計 ${totalQty.toLocaleString()}</div>
        </div>
        <div class="table-wrap"><table class="list">
          <thead><tr><th>発注日</th><th>工場</th><th>カラー名</th><th>商品名</th><th style="text-align:right">数量</th><th></th></tr></thead>
          <tbody>${rowHtml}</tbody>
        </table></div>
      </div>`;
    }).join('');
  }
}

  renderAnalytics();

function renderAnalytics(){
  const el=document.getElementById('analytics-area');
  let orders=[...D.orders];
  const fm=document.getElementById('ana-filter-month')?.value||'';
  if(fm)orders=orders.filter(o=>getYM(o.date)===fm);
  if(!orders.length){el.innerHTML='<div class="empty-state">データがありません</div>';return;}

  if(analyticsView==='factory'){
    const map={};
    orders.forEach(o=>{
      const fid=o.factoryId||'unknown';
      if(!map[fid])map[fid]={factoryId:fid,count:0,qty:0};
      map[fid].count++;
      map[fid].qty+=sumQty(o);
    });
    const rows=Object.values(map).sort((a,b)=>b.qty-a.qty);
    const totalQty=rows.reduce((s,r)=>s+r.qty,0);
    el.innerHTML=`<div class="table-wrap"><table class="list">
      <thead><tr><th>工場</th><th>工程</th><th style="text-align:right">発注件数</th><th style="text-align:right">合計数量</th><th style="text-align:right">構成比</th></tr></thead>
      <tbody>${rows.map(r=>{
        const f=D.factories.find(f=>f.id===r.factoryId);
        const pct=totalQty>0?Math.round(r.qty/totalQty*100):0;
        return `<tr>
          <td style="font-weight:500">${f?f.name:'不明'}</td>
          <td>${f?catBadge(f.category):''}</td>
          <td style="text-align:right">${r.count}件</td>
          <td style="text-align:right;font-weight:500">${r.qty.toLocaleString()}</td>
          <td style="text-align:right">
            <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
              <div style="width:80px;height:6px;background:#f0ede8;border-radius:3px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:#1a1a1a;border-radius:3px"></div>
              </div>
              <span style="font-size:12px;color:#888;min-width:32px">${pct}%</span>
            </div>
          </td>
        </tr>`;
      }).join('')}
      <tr style="background:#faf9f7;font-weight:600">
        <td colspan="3" style="text-align:right;color:#888">合計</td>
        <td style="text-align:right">${totalQty.toLocaleString()}</td>
        <td></td>
      </tr></tbody>
    </table></div>`;

  } else if(analyticsView==='fabric'){
    const map={};
    orders.forEach(o=>{
      const cat=getCat(o);
      const qk=QTY_KEY[cat]||'qty';
      (o.items||[]).forEach(item=>{
        const k=item.fabricNo||'（品番なし）';
        if(!map[k])map[k]={fabricNo:k,colors:new Set(),orderCount:0,qty:0,products:new Set()};
        map[k].orderCount++;
        map[k].qty+=parseInt(item[qk])||0;
        if(item.color)map[k].colors.add(item.color);
        if(item.productName)map[k].products.add(item.productName);
      });
    });
    const rows=Object.values(map).sort((a,b)=>b.qty-a.qty);
    const totalQty=rows.reduce((s,r)=>s+r.qty,0);
    el.innerHTML=`<div class="table-wrap"><table class="list">
      <thead><tr><th>生地番号</th><th>カラー展開</th><th>商品</th><th style="text-align:right">明細数</th><th style="text-align:right">合計数量</th><th style="text-align:right">構成比</th></tr></thead>
      <tbody>${rows.map(r=>{
        const pct=totalQty>0?Math.round(r.qty/totalQty*100):0;
        const colors=[...r.colors].join('・')||'—';
        const products=[...r.products].join('・')||'—';
        return `<tr>
          <td style="font-weight:500;font-family:monospace">${r.fabricNo}</td>
          <td style="font-size:12px;color:#666">${colors}</td>
          <td style="font-size:12px;color:#666">${products}</td>
          <td style="text-align:right">${r.orderCount}</td>
          <td style="text-align:right;font-weight:500">${r.qty.toLocaleString()}</td>
          <td style="text-align:right">
            <div style="display:flex;align-items:center;justify-content:flex-end;gap:8px">
              <div style="width:80px;height:6px;background:#f0ede8;border-radius:3px;overflow:hidden">
                <div style="width:${pct}%;height:100%;background:#1a1a1a;border-radius:3px"></div>
              </div>
              <span style="font-size:12px;color:#888;min-width:32px">${pct}%</span>
            </div>
          </td>
        </tr>`;
      }).join('')}
      <tr style="background:#faf9f7;font-weight:600">
        <td colspan="4" style="text-align:right;color:#888">合計</td>
        <td style="text-align:right">${totalQty.toLocaleString()}</td>
        <td></td>
      </tr></tbody>
    </table></div>`;
  }
}

async function addLocDirect(){

function getLocMap(){
  const m={};
  D.locations.forEach(l=>{m[l.fabric_no+'|'+(l.color||'')]=l;});
  return m;
}

function buildFabricList(){
  const map={};
  D.orders.forEach(o=>{
    (o.items||[]).forEach(item=>{
      const fn=item.fabricNo||'';
      if(!fn)return;
      const co=item.color||'';
      const key=fn+'|'+co;
      if(!map[key]||o.date>map[key].lastDate){
        map[key]={fabricNo:fn,color:co,lastDate:o.date,lastFactoryId:o.factoryId};
      }
    });
  });
  return map;
}

function buildLocRows(){
  // DB登録済みのlocationレコードを1件1行で返す（同生地が複数場所に存在可）
  const rows=D.locations.map(l=>{
    const factoryId=l.factory_id||null;
    const f=D.factories.find(f=>f.id===factoryId);
    return {
      fabricNo:l.fabric_no,
      color:l.color||'',
      factoryId,
      factory:f||null,
      quantity:l.quantity||0,
      updatedDate:l.updated_at?l.updated_at.substring(0,10):'',
      memo:l.memo||'',
      isManual:true,
    };
  });
  // 発注書にあるがlocationレコードがない生地は推定行として追加（数量0）
  const registeredKeys=new Set(D.locations.map(l=>l.fabric_no+'|'+(l.color||'')));
  const fabricMap=buildFabricList();
  Object.values(fabricMap).forEach(data=>{
    const key=data.fabricNo+'|'+data.color;
    if(!registeredKeys.has(key)){
      const factoryId=data.lastFactoryId||null;
      const f=D.factories.find(f=>f.id===factoryId);
      rows.push({fabricNo:data.fabricNo,color:data.color,factoryId,factory:f||null,quantity:0,updatedDate:data.lastDate,memo:'',isManual:false});
    }
  });
  return rows;
}

function renderLocations(){
  if(locView==='factory'){renderLocByFactory();return;}
  renderLocList();
}

function renderLocList(){
  const el=document.getElementById('location-area');
  const filterFactory=document.getElementById('loc-filter-factory')?.value||'';
  const filterFabric=document.getElementById('loc-filter-fabric')?.value||'';
  const search=(document.getElementById('loc-search')?.value||'').trim().toLowerCase();

async function returnToSelf(idx){
  const r=locRows[idx];
  if(!confirm(`「${r.fabricNo}」を自社保管に移動しますか？`))return;
  const selfLoc=D.locations.find(l=>l.fabric_no===r.fabricNo&&(l.color||'')===r.color&&!l.factory_id);
  const newSelfQty=(selfLoc?selfLoc.quantity:0)+r.quantity;
  let ok=await saveLocRecord(r.fabricNo,r.color,null,r.memo,newSelfQty);
  if(ok&&r.factoryId)ok=await saveLocRecord(r.fabricNo,r.color,r.factoryId,'',0);
  if(ok){showAlert(`「${r.fabricNo}」を自社保管に移動しました`);renderLocations();}
}

async function confirmMove(){
  if(!moveTarget)return;
  const toFactoryId=document.getElementById('move-factory').value||null;
  const memo=document.getElementById('move-memo').value.trim();
  const moveQty=parseInt(document.getElementById('move-quantity').value)||0;
  if(moveQty<=0){showAlert('移動する数量を入力してください','err');return;}
  if(moveQty>moveTarget.currentQty){showAlert('移動数量が現在数を超えています','err');return;}
  const dstLoc=D.locations.find(l=>l.fabric_no===moveTarget.fabricNo&&(l.color||'')===moveTarget.color&&(l.factory_id||null)===(toFactoryId||null));
  const dstQty=dstLoc?dstLoc.quantity:0;
  const remaining=moveTarget.currentQty-moveQty;
  let ok=await saveLocRecord(moveTarget.fabricNo,moveTarget.color,moveTarget.factoryId,moveTarget.memo,remaining);
  if(ok)ok=await saveLocRecord(moveTarget.fabricNo,moveTarget.color,toFactoryId,memo,dstQty+moveQty);
  if(ok){
    const f=D.factories.find(f=>f.id===toFactoryId);
    showAlert(`「${moveTarget.fabricNo}」を${moveQty}反「${f?f.name:'自社保管'}」に移動しました`);
    renderLocations();
  }
  closeMoveModal();
}

async function deleteLocRow(fabricNo,color,factoryId){
  const fid=factoryId||null;
  if(!confirm(`「${fabricNo} / ${color||'—'}」を削除しますか？`))return;
  if(locStorageMode){
    D.locations=D.locations.filter(l=>!(l.fabric_no===fabricNo&&(l.color||'')===(color||'')&&(l.factory_id||null)===fid));
    localStorage.setItem(LS_LOC_KEY,JSON.stringify(D.locations));
  }else{
    let delQ=sb.from('fabric_locations').delete().eq('fabric_no',fabricNo).eq('color',color||'');
    delQ=fid?delQ.eq('factory_id',fid):delQ.is('factory_id',null);
    const{error}=await delQ;
    if(error){showAlert('削除に失敗しました：'+error.message,'err');return;}
    D.locations=D.locations.filter(l=>!(l.fabric_no===fabricNo&&(l.color||'')===(color||'')&&(l.factory_id||null)===fid));
  }
  showAlert(`「${fabricNo}」を削除しました`);
  renderLocations();
}

// 単一locationレコードの保存・更新・削除（quantity<=0で削除）
// アラート・再描画は呼び出し元が行う
async function saveLocRecord(fabricNo,color,factoryId,memo,quantity){
  const now=new Date().toISOString();
  const q=parseInt(quantity)||0;
  const fid=factoryId||null;
  const findIdx=()=>D.locations.findIndex(l=>l.fabric_no===fabricNo&&(l.color||'')===(color||'')&&(l.factory_id||null)===fid);
  if(locStorageMode){
    const idx=findIdx();
    if(q<=0){if(idx>=0)D.locations.splice(idx,1);}
    else{
      const rec={fabric_no:fabricNo,color:color||'',factory_id:fid,memo:memo||'',quantity:q,updated_at:now};
      if(idx>=0)D.locations[idx]=rec;else D.locations.push(rec);
    }
    localStorage.setItem(LS_LOC_KEY,JSON.stringify(D.locations));
    return true;
  }
  const idx=findIdx();
  if(q<=0){
    if(idx>=0){
      let delQ=sb.from('fabric_locations').delete().eq('fabric_no',fabricNo).eq('color',color||'');
      delQ=fid?delQ.eq('factory_id',fid):delQ.is('factory_id',null);
      const{error}=await delQ;
      if(error){showAlert('削除に失敗しました：'+error.message,'err');return false;}
      D.locations.splice(idx,1);
    }
  }else{
    const rec={fabric_no:fabricNo,color:color||'',factory_id:fid,memo:memo||'',quantity:q,updated_at:now};
    if(idx>=0){
      let upQ=sb.from('fabric_locations').update({memo:memo||'',quantity:q,updated_at:now}).eq('fabric_no',fabricNo).eq('color',color||'');
      upQ=fid?upQ.eq('factory_id',fid):upQ.is('factory_id',null);
      const{error}=await upQ;
      if(error){showAlert('更新に失敗しました：'+error.message,'err');return false;}
      D.locations[idx]={...D.locations[idx],...rec};
    }else{
      const{data,error}=await sb.from('fabric_locations').insert(rec).select().single();
      if(error){showAlert('登録に失敗しました：'+error.message,'err');return false;}
      D.locations.push(data||rec);
    }
  }
  return true;
}

async function saveMoveLocation(fabricNo,color,factoryId,memo,quantity){

function calcMoveAfter(i,curQty){
  const qty=parseInt(document.getElementById('omr-qty-'+i)?.value)||0;
  const after=curQty-qty;
  const el=document.getElementById('omr-after-'+i);
  if(!el)return;
  el.textContent=after>=0?after+' 反':'⚠ '+after;
  el.style.color=after<0?'#c00':after===0?'#999':'#1a1a1a';
}

function onOrderMoveCheck(i,checked){
  orderMoveChecked[i]=checked;
  const row=document.getElementById('omr-row-'+i);
  if(row)row.style.background=checked?'#f0f7ff':'';
  ['omr-dest-'+i,'omr-qty-'+i].forEach(id=>{
    const el=document.getElementById(id);
    if(!el)return;
    el.disabled=!checked;
    el.style.background=checked?'#fff':'#f5f4f0';
    el.style.color=checked?'#1a1a1a':'#aaa';
  });
  const afterEl=document.getElementById('omr-after-'+i);
  if(afterEl){afterEl.style.color=checked?'#1a1a1a':'#aaa';}
  if(checked){
    const dest=document.getElementById('omr-dest-'+i);
    if(dest){dest.value=document.getElementById('o-factory').value||'';}
    calcMoveAfter(i,orderMoveRows[i]?.quantity||0);
  }else{
    if(afterEl)afterEl.textContent='—';
  }
}

function onFactoryChange(){
  const fid=document.getElementById('o-factory').value;
  if(!fid){
    document.getElementById('process-tag').innerHTML='';
    document.getElementById('o-factory-badge').innerHTML='';
    document.getElementById('items-hint').style.display='block';
    document.getElementById('items-table').style.display='none';
    document.getElementById('items-body').innerHTML='';
    document.getElementById('add-row-btn').style.display='none';
    currentSchema=[];return;
  }
  const f=D.factories.find(f=>f.id===fid);
  const cat=f?f.category:'その他';
  currentSchema=SCHEMA[cat]||SCHEMA['その他'];
  document.getElementById('process-tag').innerHTML=
    `<span class="process-tag" style="${CAT_STYLE[cat]||CAT_STYLE['その他']}">${cat}</span>`;
  document.getElementById('o-factory-badge').innerHTML=catBadge(cat);
  const th=currentSchema.map(c=>`<th style="width:${c.w}%">${c.label}</th>`).join('');
  document.getElementById('items-head').innerHTML=`<tr>${th}<th style="width:6%"></th></tr>`;
  document.getElementById('items-body').innerHTML='';
  document.getElementById('items-hint').style.display='none';
  document.getElementById('items-table').style.display='table';
  document.getElementById('add-row-btn').style.display='inline-block';
  addItemRow();addItemRow();addItemRow();
  renderMovementSection();
}
function addItemRow(){
  if(!currentSchema.length)return;
  const tr=document.createElement('tr');
  const cells=currentSchema.map(c=>{
    if(c.type==='unit'){
      return `<td><select data-key="${c.key}" style="padding:5px 4px;font-size:12px;width:100%">
        <option value="kg">kg</option>
        <option value="ケース">ケース</option>
        <option value="本">本</option>
      </select></td>`;
    }
    const align=c.type==='number'?'text-align:right':'';
    return `<td><input type="${c.type}" placeholder="${c.type==='number'?'0':c.label}" min="0" style="${align}" data-key="${c.key}"></td>`;
  }).join('');
  tr.innerHTML=cells+`<td style="text-align:center"><button class="btn sm danger" onclick="this.closest('tr').remove()">×</button></td>`;
  document.getElementById('items-body').appendChild(tr);
}
async function saveOrder(){
  const factoryId=document.getElementById('o-factory').value;
  const date=document.getElementById('o-date').value;
  if(!factoryId){showAlert('工場を選択してください','err');return;}
  if(!date){showAlert('発注日を入力してください','err');return;}
  if(!currentSchema.length){showAlert('工場を選択してください','err');return;}
  const rows=[...document.querySelectorAll('#items-body tr')];
  const items=rows.map(tr=>{
    const obj={};
    tr.querySelectorAll('[data-key]').forEach(el=>{obj[el.dataset.key]=el.value.trim();});
    return obj;
  }).filter(i=>Object.values(i).some(v=>v!==''&&v!=='kg'));
  if(!items.length){showAlert('明細を1行以上入力してください','err');return;}
  const f=D.factories.find(f=>f.id===factoryId);
  const order={
    id:genId(),
    number:document.getElementById('o-number').value,
    factory_id:factoryId,
    category:f?f.category:'その他',
    date,
    due:document.getElementById('o-due').value,
    memo:document.getElementById('o-memo').value,
    items
  };
  const movements=Object.keys(orderMoveChecked)
    .filter(i=>orderMoveChecked[i]&&orderMoveRows[i]?.fabricNo)
    .map(i=>{
      const r=orderMoveRows[i];
      const qty=parseInt(document.getElementById('omr-qty-'+i)?.value)||0;
      const destFactoryId=document.getElementById('omr-dest-'+i)?.value||null;
      return {fabric_no:r.fabricNo,color:r.color,from_factory_id:r.factoryId,dest_factory_id:destFactoryId,quantity:qty};
    });
  const{error}=await sb.from('om_orders').insert({...order,movements});
  if(error){showAlert('保存に失敗しました','err');return;}
  D.orders.push({...order,factoryId,createdAt:new Date().toISOString()});
  for(const m of movements){
    if(!m.fabric_no||m.quantity<=0)continue;
    // 元の場所の数量を減らす
    const srcLoc=D.locations.find(l=>l.fabric_no===m.fabric_no&&(l.color||'')===m.color&&(l.factory_id||null)===(m.from_factory_id||null));
    const srcQty=srcLoc?srcLoc.quantity:0;
    await saveLocRecord(m.fabric_no,m.color,m.from_factory_id,srcLoc?.memo||'',srcQty-m.quantity);
    // 移動先の数量を増やす
    const dstLoc=D.locations.find(l=>l.fabric_no===m.fabric_no&&(l.color||'')===m.color&&(l.factory_id||null)===(m.dest_factory_id||null));
    const dstQty=dstLoc?dstLoc.quantity:0;
    await saveLocRecord(m.fabric_no,m.color,m.dest_factory_id,'',dstQty+m.quantity);
  }
  closeModal();renderDashboard();
  showAlert(`発注書 ${order.number} を保存しました`);
}

function printOrder(id){
  const o=D.orders.find(o=>o.id===id);if(!o)return;
  const f=D.factories.find(f=>f.id===o.factoryId);
  const cat=getCat(o);
  const schema=SCHEMA[cat]||SCHEMA['その他'];
  const qk=QTY_KEY[cat]||'qty';
  const hasUnitCol=(cat==='糸'||cat==='靴下');
  const printSchema=hasUnitCol?schema.filter(c=>c.type!=='unit'):schema;
  const thead=printSchema.map(c=>`<th style="padding:7px 10px;border:1px solid #ddd;text-align:left;background:#f5f4f0;font-size:12px">${c.label}</th>`).join('');
  const tbody=(o.items||[]).map((item,idx)=>{
    const cells=printSchema.map(c=>{
      let v=item[c.key]||'';
      if(c.key==='qty'&&hasUnitCol&&item.qtyUnit){v=`${v} ${item.qtyUnit}`;}
      const align=(c.type==='number')?'text-align:right':'';
      const disp=v===''?'':(c.type==='number'&&!isNaN(Number(v)))?Number(v).toLocaleString():v;
      return `<td style="padding:7px 10px;border:1px solid #ddd;${align}">${disp}</td>`;
    }).join('');
    return `<tr><td style="padding:7px 10px;border:1px solid #ddd;text-align:center">${idx+1}</td>${cells}</tr>`;
  }).join('');
  const totalQty=(o.items||[]).reduce((s,i)=>s+(parseInt(i[qk])||0),0);
  const unitSet=hasUnitCol?[...new Set((o.items||[]).map(i=>i.qtyUnit).filter(Boolean))]:[];
  const unitLabel=hasUnitCol?(unitSet.length===1?unitSet[0]:'(複数単位)'):UNIT[cat]||'点';
  document.getElementById('print-content').innerHTML=`
    <div style="font-family:'Helvetica Neue',Arial,Meiryo,sans-serif;padding:40px;max-width:760px;margin:0 auto">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:28px">
        <div>
          <h1 style="font-size:22px;font-weight:700;margin-bottom:4px;letter-spacing:.05em">発 注 書</h1>
          <div style="font-size:11px;color:#888">発注番号：${o.number}　工程：${cat}</div>
        </div>
        <div style="text-align:right;font-size:12px;color:#555">
          <div style="font-weight:600;font-size:14px;margin-bottom:2px">株式会社エル・アイ・シー</div>
          <div>mofmofu</div>
        </div>
      </div>
      <table style="width:100%;margin-bottom:22px;font-size:13px;border-collapse:collapse">
        <tr><td style="width:80px;color:#888;padding:4px 0">発注先</td><td style="font-weight:600;font-size:15px">${f?f.name:''} ${f&&f.contact?f.contact+' 御中':' 御中'}</td></tr>
        <tr><td style="color:#888;padding:4px 0">発注日</td><td>${o.date}</td></tr>
        <tr><td style="color:#888;padding:4px 0">希望納期</td><td>${o.due||'別途ご相談'}</td></tr>
      </table>
      <table style="width:100%;border-collapse:collapse;font-size:13px">
        <thead><tr><th style="padding:7px 10px;border:1px solid #ddd;text-align:center;background:#f5f4f0;width:5%">No</th>${thead}</tr></thead>
        <tbody>${tbody}</tbody>
        <tfoot><tr>
          <td colspan="${printSchema.length}" style="padding:7px 10px;border:1px solid #ddd;text-align:right;font-weight:600;background:#faf9f7">合計</td>
          <td style="padding:7px 10px;border:1px solid #ddd;text-align:right;font-weight:600;background:#faf9f7">${totalQty.toLocaleString()} ${unitLabel}</td>
        </tr></tfoot>
      </table>
      ${o.memo?`<div style="margin-top:18px;font-size:12px;color:#555;border-top:1px solid #eee;padding-top:12px"><b>備考：</b>${o.memo}</div>`:''}
      <div style="margin-top:36px;font-size:11px;color:#ccc;text-align:center">— 以上 —</div>
    </div>`;
  window.print();
}

function showAlert(msg,type='ok'){
  const el=document.getElementById('alert-area');
  el.innerHTML=`<div class="alert alert-${type}">${msg}</div>`;
  setTimeout(()=>el.innerHTML='',3000);
}

(async()=>{await load();renderDashboard();})();
</script>

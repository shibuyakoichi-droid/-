<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>工程管理 — mofmofu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
<style>
  :root {
    --bg: #f5f1ea;
    --bg-card: #fffdf8;
    --ink: #1a1a1a;
    --ink-soft: #6b6357;
    --line-color: #d4cdbf;
    --accent: #a64635;
    --accent-soft: #c9826f;
    --accent-bg: #fdf3ee;
    --ok: #5a7a3e;
    --ok-bg: #f4f8ec;
    --warn: #b8842a;
    --warn-bg: #fcf6e8;
    --set: #3d6fa8;
    --set-bg: #eef4fc;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body {
    font-family: "Noto Sans JP", sans-serif;
    background: var(--bg);
    color: var(--ink);
    min-height: 100vh;
    font-size: 14px;
  }

  .form-screen { background: var(--bg); min-height: 100vh; padding-bottom: 80px; }

  .form-header {
    background: var(--bg-card); padding: 14px 16px;
    border-bottom: 1px solid var(--line-color);
    display: flex; align-items: center; gap: 10px;
    position: sticky; top: 0; z-index: 20;
  }
  .form-close { font-size: 22px; color: var(--ink-soft); width: 24px; cursor: pointer; user-select: none; }
  .form-title-box { flex: 1; }
  .form-title { font-family: "Shippori Mincho", serif; font-size: 16px; font-weight: 700; }
  .form-sub { font-size: 10px; color: var(--ink-soft); font-family: "JetBrains Mono", monospace; letter-spacing: .05em; }
  .user-badge { font-size: 11px; color: var(--accent); font-weight: 700; background: var(--accent-bg); padding: 4px 10px; border-radius: 12px; }

  .form-body { padding: 16px; }

  .mode-tabs {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 4px;
    background: #ebe5da; padding: 4px; border-radius: 10px; margin-bottom: 20px;
  }
  .mtab {
    padding: 8px 2px; font-size: 10px; font-weight: 700;
    background: transparent; border: none; border-radius: 7px;
    color: var(--ink-soft); cursor: pointer; font-family: inherit;
    transition: all .2s; line-height: 1.3;
  }
  .mtab.active { background: var(--bg-card); color: var(--accent); box-shadow: 0 1px 3px rgba(0,0,0,.08); }
  .mtab .icon { display: block; font-size: 16px; margin-bottom: 2px; }

  .field { margin-bottom: 18px; }
  .field-label { font-size: 12px; font-weight: 700; color: var(--ink); margin-bottom: 6px; display: flex; align-items: center; gap: 6px; }
  .field-label .req { color: var(--accent); font-size: 10px; }
  .field-hint { font-size: 10px; color: var(--ink-soft); margin-top: 4px; line-height: 1.5; }

  .select-wrap { position: relative; }
  select, input[type=text], input[type=number], textarea {
    width: 100%; padding: 12px 14px; font-size: 14px;
    background: var(--bg-card); border: 1px solid var(--line-color); border-radius: 8px;
    font-family: inherit; color: var(--ink);
    appearance: none; -webkit-appearance: none;
  }
  select { padding-right: 36px; cursor: pointer; }
  .select-wrap::after { content: '▾'; position: absolute; right: 14px; top: 50%; transform: translateY(-50%); color: var(--ink-soft); pointer-events: none; font-size: 12px; }
  textarea { resize: vertical; min-height: 60px; }

  .stage-pills { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
  .pill {
    padding: 12px 4px; font-size: 11px; font-weight: 500;
    background: var(--bg-card); border: 1px solid var(--line-color);
    border-radius: 8px; cursor: pointer; text-align: center;
    color: var(--ink); transition: all .15s; user-select: none;
  }
  .pill.selected { background: var(--accent-bg); border-color: var(--accent); color: var(--accent); font-weight: 700; }
  .pill.disabled { opacity: .35; cursor: not-allowed; background: #f0ebe0; pointer-events: none; }

  .flow-preview {
    background: var(--accent-bg); border: 1px dashed var(--accent-soft);
    border-radius: 8px; padding: 12px; margin: 16px 0;
    text-align: center; font-size: 13px;
  }
  .flow-preview .from-to { font-weight: 700; color: var(--accent); font-size: 14px; margin-bottom: 4px; }
  .flow-preview .arrow { margin: 0 8px; color: var(--accent-soft); }
  .flow-preview .qty { font-family: "JetBrains Mono", monospace; font-size: 18px; font-weight: 700; color: var(--accent); margin-top: 4px; }

  .context-box {
    background: var(--ok-bg); border-left: 3px solid var(--ok);
    padding: 10px 12px; border-radius: 4px; margin-bottom: 18px;
    font-size: 11px; line-height: 1.6;
  }
  .context-box .ctx-title { font-weight: 700; color: var(--ok); font-size: 11px; letter-spacing: .05em; margin-bottom: 4px; }
  .context-box.warn { background: var(--warn-bg); border-left-color: var(--warn); }
  .context-box.warn .ctx-title { color: var(--warn); }
  .context-box.set-box { background: var(--set-bg); border-left-color: var(--set); }
  .context-box.set-box .ctx-title { color: var(--set); }

  .qty-row { display: grid; grid-template-columns: 1fr 80px; gap: 8px; }
  .unit-display { display: flex; align-items: center; justify-content: center; background: var(--accent-bg); border: 1px solid var(--accent-soft); border-radius: 8px; font-weight: 700; color: var(--accent); font-size: 14px; }

  .submit-btn {
    width: 100%; padding: 14px; background: var(--accent);
    color: white; border: none; border-radius: 10px;
    font-size: 15px; font-weight: 700; font-family: inherit;
    cursor: pointer; margin-top: 8px;
    box-shadow: 0 4px 12px -4px rgba(166,70,53,.5);
  }
  .submit-btn:active { transform: translateY(1px); }
  .submit-btn:disabled { opacity: .5; cursor: not-allowed; }

  .quick-row { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 16px; }
  .quick-btn { padding: 10px; background: var(--bg-card); border: 1px solid var(--line-color); border-radius: 6px; font-size: 11px; cursor: pointer; font-family: inherit; color: var(--ink-soft); }
  .quick-btn:active { background: var(--accent-bg); }

  .toast {
    position: fixed; bottom: 24px; left: 50%; transform: translateX(-50%);
    background: var(--ok); color: white; padding: 12px 20px;
    border-radius: 24px; font-size: 13px; font-weight: 700;
    box-shadow: 0 8px 20px -8px rgba(90,122,62,.6);
    opacity: 0; pointer-events: none; transition: opacity .3s;
    z-index: 100;
  }
  .toast.show { opacity: 1; }
  .toast.error { background: var(--accent); }

  .loading { display: none; text-align: center; padding: 40px; color: var(--ink-soft); font-size: 13px; }
  .loading.show { display: block; }
  .spinner { display: inline-block; width: 24px; height: 24px; border: 2px solid var(--line-color); border-top-color: var(--accent); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 8px; }
  @keyframes spin { to { transform: rotate(360deg); } }

  .mode-外部入荷 .field-source { display: none; }
  .mode-外部入荷 .field-dest   { display: none; }
  .mode-出荷数更新 .field-source { display: none; }
  .mode-出荷数更新 .field-dest   { display: none; }
  .mode-生産目標更新 .field-source { display: none; }
  .mode-生産目標更新 .field-dest   { display: none; }
  .mode-修正 .field-source { display: none; }
  .mode-修正 .field-dest   { display: none; }
  .field-fix-stage { display: none; }
  .mode-修正 .field-fix-stage { display: block; }
  .field-dest-fixed { display: none; }
  .mode-外部入荷 .field-dest-fixed { display: block; }
  .fixed-dest-display { padding: 12px 14px; background: var(--ok-bg); border: 1px solid var(--ok); border-radius: 8px; font-weight: 700; color: var(--ok); font-size: 14px; }

  .set-info { display: none; margin-bottom: 12px; }
  .set-info.show { display: block; }
  .set-components { font-size: 12px; color: var(--set); line-height: 1.8; }
</style>
</head>
<body>

<div class="form-screen mode-工程移動" id="formScreen">
  <div class="form-header">
    <div class="form-close" onclick="closeApp()">×</div>
    <div class="form-title-box">
      <div class="form-title">工程進捗を入力</div>
      <div class="form-sub">MOFMOFU PIPELINE INPUT</div>
    </div>
    <div class="user-badge" id="userBadge">読込中…</div>
  </div>

  <div class="form-body" id="formBody">

    <div class="mode-tabs">
      <button class="mtab" data-mode="外部入荷" onclick="switchMode('外部入荷')">
        <span class="icon">🆕</span>入荷
      </button>
      <button class="mtab active" data-mode="工程移動" onclick="switchMode('工程移動')">
        <span class="icon">🔄</span>移動
      </button>
      <button class="mtab" data-mode="出荷数更新" onclick="switchMode('出荷数更新')">
        <span class="icon">📦</span>出荷数
      </button>
      <button class="mtab" data-mode="生産目標更新" onclick="switchMode('生産目標更新')">
        <span class="icon">🎯</span>目標
      </button>
      <button class="mtab" data-mode="修正" onclick="switchMode('修正')">
        <span class="icon">🔧</span>修正
      </button>
    </div>

    <!-- 商品（工場） -->
    <div class="field">
      <div class="field-label">商品（工場） <span class="req">必須</span></div>
      <div class="select-wrap">
        <select id="productSelect" onchange="onProductChange()"></select>
      </div>
    </div>

    <!-- SKU -->
    <div class="field">
      <div class="field-label">SKU(色) <span class="req">必須</span></div>
      <div class="select-wrap">
        <select id="skuSelect" onchange="onSkuChange()"></select>
      </div>
    </div>

    <!-- セット品情報 -->
    <div class="set-info" id="setInfo">
      <div class="context-box set-box">
        <div class="ctx-title">🎁 セット品</div>
        <div id="setComponents" class="set-components"></div>
      </div>
    </div>

    <!-- Stock context -->
    <div class="context-box" id="contextBox">
      <div class="ctx-title">▼ 現在の状況</div>
      <div id="contextContent">SKUを選択してください</div>
    </div>

    <!-- 移動元 -->
    <div class="field field-source">
      <div class="field-label">移動元 <span class="req">必須</span></div>
      <div class="stage-pills" id="sourcePills"></div>
    </div>

    <!-- 移動先 -->
    <div class="field field-dest">
      <div class="field-label">移動先 <span class="req">必須</span></div>
      <div class="stage-pills" id="destPills"></div>
      <div class="field-hint">※ 途中工程をスキップしてもOK</div>
    </div>

    <!-- 修正対象工程 -->
    <div class="field field-fix-stage">
      <div class="field-label">修正する工程 <span class="req">必須</span></div>
      <div class="stage-pills" id="fixStagePills"></div>
      <div class="context-box" id="currentValBox" style="display:none; margin-top:10px;">
        <div class="ctx-title">▼ 現在の登録値</div>
        <div id="currentValContent"></div>
      </div>
    </div>

    <!-- 入荷先（外部入荷モードのみ・工場別で動的） -->
    <div class="field field-dest-fixed">
      <div class="field-label">入荷先</div>
      <div class="fixed-dest-display" id="fixedDestDisplay">🏭 神木さん（糸の投入先）</div>
    </div>

    <!-- Flow preview -->
    <div class="flow-preview">
      <div class="from-to" id="flowText">―</div>
      <div class="qty" id="flowQty">― 個</div>
    </div>

    <!-- 数量 -->
    <div class="field">
      <div class="field-label" id="qtyLabel">数量 <span class="req">必須</span></div>
      <div class="qty-row">
        <input type="number" id="qtyInput" inputmode="numeric" placeholder="0" oninput="updateFlow()">
        <div class="unit-display" id="unitDisplay">個</div>
      </div>
    </div>

    <!-- 備考 -->
    <div class="field">
      <div class="field-label">備考(任意)</div>
      <textarea id="memoInput" placeholder="例: 一部色ムラあり、別便で送付"></textarea>
    </div>

    <button class="submit-btn" onclick="submitForm()">この内容で記録する</button>

    <div class="quick-row">
      <button class="quick-btn" onclick="copyLast()">↻ 直前の入力をコピー</button>
      <button class="quick-btn" onclick="openDashboard()">📊 ダッシュボード</button>
    </div>
  </div>

  <div class="loading" id="loadingScreen">
    <div class="spinner"></div>
    <div>送信中…</div>
  </div>
</div>

<div class="toast" id="toast"></div>

  ],
  stages: [
    { code: 'S01',  name: '神木さん',             order: 1, unit: 'kg', extInput: true,  next: ['エルアイシー(未縫製)'] },
    { code: 'S01B', name: '西尾さん',             order: 1, unit: 'kg', extInput: true,  next: ['エルアイシー(未縫製)'] },
    { code: 'S02',  name: 'エルアイシー(未縫製)', order: 2, unit: '個', extInput: false, next: ['池本さん','刑務所','出荷'] },
    { code: 'S03',  name: '池本さん',             order: 3, unit: '個', extInput: false, next: ['エルアイシー(加工前)','出荷'] },
    { code: 'S04',  name: '刑務所',               order: 3, unit: '個', extInput: false, next: ['エルアイシー(加工前)','出荷'] },
    { code: 'S05',  name: 'エルアイシー(加工前)', order: 4, unit: '個', extInput: false, next: ['内職','出荷'] },
    { code: 'S06',  name: '内職',                 order: 5, unit: '個', extInput: false, next: ['実在庫','出荷'] },
    { code: 'S07',  name: '実在庫',               order: 6, unit: '個', extInput: false, next: ['出荷'] }
  ],
  snapshot: {}
};

let masterData       = JSON.parse(JSON.stringify(DEFAULT_DATA));
let currentMode      = '工程移動';
let selectedSource   = null;
let selectedDest     = null;
let selectedFixStage = null;
let userName         = '未認証';
let userId           = null;
let lastSubmission   = null;

// ============================================================
// LIFF init
// ============================================================
async function initLiff() {
  try {
    if (LIFF_ID && LIFF_ID !== 'YOUR_LIFF_ID_HERE') {
      await liff.init({ liffId: LIFF_ID });
      if (!liff.isLoggedIn()) { liff.login(); return; }
      const profile = await liff.getProfile();
      userName = profile.displayName;
      userId   = profile.userId;
      document.getElementById('userBadge').textContent = userName;
    } else {
      userName = 'テスト';
      userId   = 'dev-user';
      document.getElementById('userBadge').textContent = userName + ' (dev)';
    }
    await loadMasterData();
    initUI();
  } catch (e) {
    console.error('LIFF init failed:', e);
    document.getElementById('userBadge').textContent = 'オフライン';
    initUI();
  }
}

async function loadMasterData() {
  if (!GAS_API_URL || GAS_API_URL === 'YOUR_GAS_WEB_APP_URL_HERE') return;
  try {
    const res  = await fetch(GAS_API_URL + '?action=getMasters');
    const data = await res.json();
    if (data.products) masterData.products = data.products;
    if (data.skus) {
      masterData.skus = data.skus.map(s => ({
        ...s,
        isSet: s.isSet === true || s.isSet === 'TRUE',
        components: s.components
          ? (Array.isArray(s.components) ? s.components : String(s.components).split(',').map(c => c.trim()).filter(Boolean))
          : []
      }));
    }
    if (data.stages)   masterData.stages   = data.stages;
    if (data.snapshot) masterData.snapshot = data.snapshot;
  } catch (e) {
    console.warn('Master data load failed, using defaults:', e);
  }
}

// ============================================================
// UI 初期化
// ============================================================
function initUI() {
  const ps = document.getElementById('productSelect');
  ps.innerHTML = masterData.products
    .map(p => `<option value="${p.code}">${p.name}</option>`).join('');
  onProductChange();
  renderFixStagePills();
  switchMode('工程移動');
}

function getProduct(code) {
  return masterData.products.find(p => p.code === code);
}

function getFactory(productCode) {
  const p = getProduct(productCode);
  return p && p.factory ? p.factory : '神木さん';
}

function getCurrentProduct() {
  return document.getElementById('productSelect').value;
}

function getCurrentSku() {
  const code = document.getElementById('skuSelect').value;
  return masterData.skus.find(s => s.code === code);
}

// ============================================================
// 商品変更 → SKU絞り込み・ステージ・入荷先を更新
// ============================================================
function onProductChange() {
  const product = getCurrentProduct();
  const skus    = masterData.skus.filter(s => s.product === product);
  document.getElementById('skuSelect').innerHTML =
    skus.map(s => `<option value="${s.code}">${s.name}${s.isSet ? ' 🎁' : ''}</option>`).join('');

  const factory = getFactory(product);
  document.getElementById('fixedDestDisplay').textContent = `🏭 ${factory}（糸の投入先）`;
  if (currentMode === '外部入荷') selectedDest = factory;

  renderStagePills(product);
  onSkuChange();
}

function onSkuChange() {
  updateContext();
  updateUnitDisplay();
  updateFlow();
}

// ============================================================
// コンテキスト表示
// ============================================================
function updateContext() {
  const sku = getCurrentSku();
  if (!sku) return;

  if (sku.isSet) {
    showSetInfo(sku);
    const stocks = sku.components.map(c => (masterData.snapshot[c] || {})['実在庫'] || 0);
    const maxSets = Math.min(...stocks);
    const comps = sku.components.map(c => {
      const s = masterData.skus.find(x => x.code === c);
      return `　${s ? s.name : c}：実在庫 <b>${(masterData.snapshot[c] || {})['実在庫'] || 0}個</b>`;
    });
    const box = document.getElementById('contextBox');
    box.className = 'context-box set-box';
    document.getElementById('contextContent').innerHTML =
      `<div style="font-weight:700;color:var(--set);margin-bottom:4px">🎁 構成色の在庫</div>` +
      comps.join('<br>') +
      `<br><b style="color:var(--set)">セット可能数：最大 ${maxSets} セット</b>`;
    return;
  }

  document.getElementById('setInfo').classList.remove('show');

  const factory   = getFactory(getCurrentProduct());
  const snap      = masterData.snapshot[sku.code] || {};
  const factoryKg = snap[factory] || 0;
  const factoryPcs = Math.round(factoryKg / KG_PER_PCS);
  const physStock = snap.physStock != null ? snap.physStock : (snap['実在庫'] || 0);
  const shipped   = snap.shipped   != null ? snap.shipped   : (snap['出荷数'] || 0);
  const naiShoku  = snap['内職']   || 0;
  const target    = snap.target    != null ? snap.target    : 0;
  const backlog   = snap.backlog   != null ? snap.backlog   : 0;
  const produced  = physStock + shipped;

  const processStages = ['エルアイシー(未縫製)','池本さん','刑務所','エルアイシー(加工前)','内職','実在庫'];
  const stagePcs = processStages.reduce((s, st) => s + (snap[st] || 0), 0);
  const processTotal = factoryPcs + stagePcs;
  const diff = backlog - processTotal;

  const parts = [];
  if (factoryKg)  parts.push(`${factory}:${factoryKg}kg(≈${factoryPcs}個)`);
  const eLAIC_m = snap['エルアイシー(未縫製)'] || 0;
  const eLAIC_k = snap['エルアイシー(加工前)'] || 0;
  const ikemoto = snap['池本さん'] || 0;
  const keimu   = snap['刑務所']   || 0;
  if (eLAIC_m) parts.push(`エ社(未):${eLAIC_m}`);
  if (eLAIC_k) parts.push(`エ社(加):${eLAIC_k}`);
  if (ikemoto) parts.push(`池本:${ikemoto}`);
  if (keimu)   parts.push(`刑務:${keimu}`);
  if (naiShoku) parts.push(`内職:${naiShoku}`);
  if (physStock) parts.push(`手元在庫:${physStock.toLocaleString()}`);
  if (shipped)   parts.push(`出荷済:${shipped.toLocaleString()}`);

  const lines = [];
  lines.push(`<b>${sku.code}  ${sku.name}</b>`);
  lines.push(parts.length ? parts.join(' / ') : '在庫データなし');
  if (target > 0) lines.push(`🏭 累計生産: ${produced.toLocaleString()}個 / 目標${target.toLocaleString()}個（${snap.progress || 0}%）`);
  lines.push(`📦 手元在庫: ${physStock.toLocaleString()}個 ｜ 出荷済: ${shipped.toLocaleString()}個`);
  if (backlog > 0) {
    const diffLabel = diff > 0 ? `🔴 不足 +${diff}個` : diff < 0 ? `✅ 余裕 ${Math.abs(diff)}個` : '✅ ピッタリ';
    lines.push(`📋 出荷残: ${backlog.toLocaleString()}個 ｜ 工程合計: ${processTotal.toLocaleString()}個 → ${diffLabel}`);
  }

  const box = document.getElementById('contextBox');
  box.className = diff > 0 ? 'context-box warn' : 'context-box';
  document.getElementById('contextContent').innerHTML = lines.join('<br>');
}

function showSetInfo(sku) {
  const info = document.getElementById('setInfo');
  info.classList.add('show');
  const compLines = sku.components.map(c => {
    const s = masterData.skus.find(x => x.code === c);
    return `　・${s ? s.name : c} × 1足`;
  });
  document.getElementById('setComponents').innerHTML =
    compLines.join('<br>') +
    `<br><span style="color:var(--ink-soft);font-size:10px">出荷時に各色の実在庫から 1 足ずつ引かれます</span>`;
}

// ============================================================
// ステージピル（商品の工場に応じて切り替え）
// ============================================================
function renderStagePills(productCode) {
  productCode = productCode || getCurrentProduct();
  const factory = getFactory(productCode);

  const sourceNames = [factory, 'エルアイシー(未縫製)', '池本さん', '刑務所', 'エルアイシー(加工前)', '内職', '実在庫'];
  const destNames   = ['エルアイシー(未縫製)', '池本さん', '刑務所', 'エルアイシー(加工前)', '内職', '実在庫', '出荷'];

  document.getElementById('sourcePills').innerHTML =
    sourceNames.map(n => `<div class="pill" data-stage="${n}">${n}</div>`).join('');
  document.getElementById('destPills').innerHTML =
    destNames.map(n => `<div class="pill" data-stage="${n}">${n}</div>`).join('');

  selectedSource = null;
  selectedDest   = null;

  document.querySelectorAll('#sourcePills .pill').forEach(pill => {
    pill.onclick = () => {
      if (pill.classList.contains('disabled')) return;
      document.querySelectorAll('#sourcePills .pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      selectedSource = pill.dataset.stage;
      filterDestPills();
      updateUnitDisplay();
      updateFlow();
    };
  });
  document.querySelectorAll('#destPills .pill').forEach(pill => {
    pill.onclick = () => {
      if (pill.classList.contains('disabled')) return;
      document.querySelectorAll('#destPills .pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      selectedDest = pill.dataset.stage;
      updateUnitDisplay();
      updateFlow();
    };
  });
}

function renderFixStagePills() {
  const fixStages = ['神木さん','西尾さん','エルアイシー(未縫製)','池本さん','刑務所','エルアイシー(加工前)','内職','実在庫','出荷数'];
  document.getElementById('fixStagePills').innerHTML =
    fixStages.map(n => `<div class="pill" data-stage="${n}">${n}</div>`).join('');
  document.querySelectorAll('#fixStagePills .pill').forEach(pill => {
    pill.onclick = () => {
      document.querySelectorAll('#fixStagePills .pill').forEach(p => p.classList.remove('selected'));
      pill.classList.add('selected');
      selectedFixStage = pill.dataset.stage;
      updateCurrentVal();
      updateUnitDisplay();
      updateFlow();
    };
  });
}

function updateCurrentVal() {
  const box     = document.getElementById('currentValBox');
  const content = document.getElementById('currentValContent');
  if (!selectedFixStage) { box.style.display = 'none'; return; }
  const sku  = getCurrentSku();
  const snap = sku ? (masterData.snapshot[sku.code] || {}) : {};
  const cur  = snap[selectedFixStage] != null ? snap[selectedFixStage] : 0;
  const unit = (selectedFixStage === '神木さん' || selectedFixStage === '西尾さん') ? 'kg' : '個';
  content.innerHTML = `<b>${selectedFixStage}</b>：現在 <b>${cur}${unit}</b>`;
  box.style.display = '';
}

function filterDestPills() {
  document.querySelectorAll('#destPills .pill').forEach(pill => {
    const isSame = pill.dataset.stage === selectedSource;
    pill.classList.toggle('disabled', isSame);
    if (isSame && selectedDest === pill.dataset.stage) {
      pill.classList.remove('selected');
      selectedDest = null;
    }
  });
}

// ============================================================
// 単位表示
// ============================================================
function updateUnitDisplay() {
  const ud      = document.getElementById('unitDisplay');
  const factory = getFactory(getCurrentProduct());
  const sku     = getCurrentSku();

  if (currentMode === '外部入荷') { ud.textContent = 'kg'; return; }
  if (currentMode === '修正') {
    ud.textContent = (selectedFixStage === '神木さん' || selectedFixStage === '西尾さん') ? 'kg' : '個';
    return;
  }
  if (sku && sku.isSet) { ud.textContent = 'セット'; return; }
  ud.textContent = '個';
}

// ============================================================
// モード切替
// ============================================================
function switchMode(mode) {
  currentMode = mode;
  document.getElementById('formScreen').className = 'form-screen mode-' + mode;
  document.querySelectorAll('.mtab').forEach(t =>
    t.classList.toggle('active', t.dataset.mode === mode));

  document.getElementById('qtyLabel').innerHTML = {
    '出荷数更新':   '今回の出荷数（個） <span class="req">必須</span>',
    '生産目標更新': '生産目標数（個） <span class="req">必須</span>',
    '修正':         '修正後の数値 <span class="req">必須</span>'
  }[mode] || '数量 <span class="req">必須</span>';

  selectedSource = selectedDest = selectedFixStage = null;
  document.querySelectorAll('#sourcePills .pill, #destPills .pill')
    .forEach(p => p.classList.remove('selected', 'disabled'));
  document.querySelectorAll('#fixStagePills .pill')
    .forEach(p => p.classList.remove('selected'));
  document.getElementById('currentValBox').style.display = 'none';

  if (mode === '外部入荷') {
    const factory = getFactory(getCurrentProduct());
    selectedDest = factory;
    document.getElementById('fixedDestDisplay').textContent = `🏭 ${factory}（糸の投入先）`;
  }

  updateUnitDisplay();
  updateFlow();
}

// ============================================================
// フロープレビュー
// ============================================================
function updateFlow() {
  const qty   = document.getElementById('qtyInput').value || '―';
  const unit  = document.getElementById('unitDisplay').textContent;
  const sku   = getCurrentSku();
  const isSet = sku && sku.isSet;
  let text    = '―';
  let subtext = `${qty} ${unit}`;

  if (currentMode === '外部入荷') {
    const factory = getFactory(getCurrentProduct());
    text    = `外部 → ${factory}`;
  } else if (currentMode === '工程移動') {
    text    = `${selectedSource || '?'} → ${selectedDest || '?'}`;
  } else if (currentMode === '出荷数更新') {
    if (isSet && qty !== '―') {
      const compNames = sku.components.map(c => {
        const s = masterData.skus.find(x => x.code === c);
        return s ? s.name.replace(/【.*?】/, '') : c;
      });
      text    = `セット ${qty} セット を出荷`;
      subtext = compNames.map(n => `${n} -${qty}`).join(' / ');
    } else {
      text    = `実在庫から ${qty} 個 を出荷`;
      subtext = `実在庫 -${qty} / 出荷数 +${qty}`;
    }
  } else if (currentMode === '生産目標更新') {
    text    = `生産目標を ${qty} 個 にセット`;
    subtext = '';
  } else if (currentMode === '修正') {
    text    = selectedFixStage ? `${selectedFixStage} の在庫を修正` : '工程を選択';
    subtext = qty !== '―' ? `→ ${qty} ${unit}` : '';
  }

  document.getElementById('flowText').innerHTML =
    text.replace(/→/g, '<span class="arrow">→</span>');
  document.getElementById('flowQty').textContent = subtext;
}

// ============================================================
// 送信
// ============================================================
async function submitForm() {
  const product = getCurrentProduct();
  const sku     = getCurrentSku();
  const qty     = parseFloat(document.getElementById('qtyInput').value);
  const memo    = document.getElementById('memoInput').value;
  const unit    = document.getElementById('unitDisplay').textContent;

  if (!qty || qty <= 0) return showToast('数量を入力してください', true);
  if (currentMode === '工程移動' && (!selectedSource || !selectedDest))
    return showToast('移動元・移動先を選択してください', true);
  if (currentMode === '外部入荷' && !selectedDest)
    return showToast('入荷先を選択してください', true);
  if (currentMode === '修正' && !selectedFixStage)
    return showToast('修正する工程を選択してください', true);

  const payload = {
    action:    'recordEntry',
    timestamp: new Date().toISOString(),
    user:      userName,
    userId:    userId,
    mode:      currentMode === '修正' ? '在庫修正' : currentMode,
    product:   product,
    skuCode:   sku.code,
    skuName:   sku.name,
    source:    (['外部入荷','出荷数更新','生産目標更新','修正'].includes(currentMode)) ? '—' : selectedSource,
    dest:      (['出荷数更新','生産目標更新'].includes(currentMode)) ? '—' : currentMode === '修正' ? selectedFixStage : selectedDest,
    qty:       qty,
    unit:      unit,
    memo:      memo
  };

  document.getElementById('formBody').style.display = 'none';
  document.getElementById('loadingScreen').classList.add('show');

  try {
    if (GAS_API_URL && GAS_API_URL !== 'YOUR_GAS_WEB_APP_URL_HERE') {
      const res    = await fetch(GAS_API_URL, { method: 'POST', body: JSON.stringify(payload) });
      const result = await res.json();
      if (!result.success) throw new Error(result.error || 'Unknown error');
    } else {
      await new Promise(r => setTimeout(r, 600));
    }
    lastSubmission = payload;
    showToast('✓ 記録しました');
    resetForm();
  } catch (e) {
    showToast('送信失敗: ' + e.message, true);
  } finally {
    document.getElementById('loadingScreen').classList.remove('show');
    document.getElementById('formBody').style.display = '';
  }
}

function resetForm() {
  document.getElementById('qtyInput').value  = '';
  document.getElementById('memoInput').value = '';
  switchMode(currentMode);
}

function copyLast() {
  if (!lastSubmission) return showToast('直前の入力がありません', true);
  const mode = lastSubmission.mode === '在庫修正' ? '修正' : lastSubmission.mode;
  switchMode(mode);
  document.getElementById('productSelect').value = lastSubmission.product;
  onProductChange();
  document.getElementById('skuSelect').value = lastSubmission.skuCode;
  setTimeout(() => {
    if (lastSubmission.source && lastSubmission.source !== '—') {
      const p = document.querySelector(`#sourcePills .pill[data-stage="${lastSubmission.source}"]`);
      if (p) p.click();
    }
    if (lastSubmission.dest && lastSubmission.dest !== '—') {
      const p = document.querySelector(`#destPills .pill[data-stage="${lastSubmission.dest}"]`);
      if (p) p.click();
    }
    document.getElementById('qtyInput').value = lastSubmission.qty;
    onSkuChange();
    updateFlow();
  }, 0);
}

function openDashboard() {
  if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
    liff.openWindow({ url: DASHBOARD_URL, external: false });
  } else {
    window.open(DASHBOARD_URL, '_blank');
  }
}

function closeApp() {
  if (typeof liff !== 'undefined' && liff.isInClient && liff.isInClient()) {
    liff.closeWindow();
  } else {
    history.back();
  }
}

function showToast(msg, isError) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.toggle('error', !!isError);
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2400);
}

initLiff();
</script>
</body>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程ダッシュボード — mofmofu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1ea;
  --bg-card: #fffdf8;
  --ink: #1a1a1a;
  --ink-soft: #6b6357;
  --line-color: #d4cdbf;
  --accent: #a64635;
  --accent-soft: #c9826f;
  --accent-bg: #fdf3ee;
  --ok: #5a7a3e;
  --ok-bg: #f4f8ec;
  --warn: #b8842a;
  --warn-bg: #fcf6e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
}

/* ── ヘッダー ── */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--line-color);
  padding: 14px 16px 10px;
  position: sticky; top: 0; z-index: 20;
}
.header-row { display: flex; align-items: center; justify-content: space-between; }
.header-brand { font-family: "Shippori Mincho", serif; font-size: 17px; font-weight: 700; }
.header-sub { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--ink-soft); letter-spacing: .08em; margin-top: 2px; }
.refresh-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg); border: 1px solid var(--line-color);
  border-radius: 20px; padding: 6px 12px;
  font-size: 11px; font-family: inherit; color: var(--ink-soft);
  cursor: pointer; flex-shrink: 0;
}
.refresh-icon { display: inline-block; }
.refreshing .refresh-icon { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.last-updated { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--ink-soft); margin-top: 6px; text-align: right; }

/* ── コンテンツ ── */
.content { padding: 16px; max-width: 620px; margin: 0 auto; padding-bottom: 48px; }

.sec {
  font-family: "Shippori Mincho", serif; font-size: 12px; font-weight: 700;
  color: var(--ink-soft); letter-spacing: .08em;
  margin: 20px 0 10px; text-transform: uppercase;
}

/* ── アラートバナー ── */
.banner { border-radius: 10px; padding: 11px 14px; font-size: 13px; font-weight: 700; margin-bottom: 4px; }
.banner.ng { background: var(--accent-bg); border: 1px solid var(--accent-soft); color: var(--accent); }
.banner.ok { background: var(--ok-bg); border: 1px solid var(--ok); color: var(--ok); }

/* ── 商品タブ ── */
.ptabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; margin-bottom: 4px; scrollbar-width: none; }
.ptabs::-webkit-scrollbar { display: none; }
.ptab {
  padding: 7px 14px; font-size: 12px; font-weight: 700;
  background: var(--bg-card); border: 1px solid var(--line-color);
  border-radius: 20px; cursor: pointer; font-family: inherit;
  color: var(--ink-soft); white-space: nowrap; flex-shrink: 0;
}
.ptab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── パイプラインレース ── */
.race { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.race-card { background: var(--bg-card); border: 1px solid var(--line-color); border-radius: 12px; padding: 14px 8px; text-align: center; }
.race-card.ok { background: var(--ok-bg); border-color: var(--ok); }
.race-card.ng { background: var(--accent-bg); border-color: var(--accent-soft); }
.race-lbl { font-size: 10px; color: var(--ink-soft); margin-bottom: 6px; }
.race-val { font-family: "JetBrains Mono", monospace; font-size: 22px; font-weight: 700; line-height: 1; }
.race-card.ok .race-val { color: var(--ok); }
.race-card.ng .race-val { color: var(--accent); }
.race-unit { font-size: 10px; color: var(--ink-soft); margin-top: 4px; font-family: "JetBrains Mono", monospace; }

/* ── サプライチェーン ── */
.chain-wrap {
  background: var(--bg-card); border: 1px solid var(--line-color);
  border-radius: 12px; padding: 16px 14px; overflow-x: auto; scrollbar-width: thin;
}
.chain { display: flex; align-items: center; gap: 0; min-width: max-content; }
.cn { display: flex; flex-direction: column; align-items: center; min-width: 64px; }
.cn-name { font-size: 10px; color: var(--ink-soft); margin-bottom: 5px; white-space: nowrap; }
.cn-badge {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--bg); border: 2px solid var(--line-color);
  display: flex; align-items: center; justify-content: center;
  font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700;
  text-align: center; line-height: 1.2;
}
.cn-badge.has { background: var(--accent-bg); border-color: var(--accent-soft); color: var(--accent); }
.cn-sub { font-size: 9px; color: var(--ink-soft); margin-top: 4px; font-family: "JetBrains Mono", monospace; min-height: 13px; text-align: center; }
.chain-ar { color: var(--line-color); font-size: 16px; padding: 0 2px; flex-shrink: 0; margin-bottom: 17px; }

/* ── SKUマトリクス ── */
.matrix-wrap { background: var(--bg-card); border: 1px solid var(--line-color); border-radius: 12px; overflow: hidden; }
.matrix-scroll { overflow-x: auto; }
table.matrix { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 500px; }
table.matrix th {
  background: var(--bg); padding: 8px 6px;
  text-align: center; font-size: 10px; color: var(--ink-soft);
  font-weight: 700; border-bottom: 1px solid var(--line-color); white-space: nowrap;
}
table.matrix th:first-child { text-align: left; padding-left: 14px; }
table.matrix td {
  padding: 10px 6px; text-align: center;
  border-bottom: 1px solid var(--line-color);
  font-family: "JetBrains Mono", monospace;
}
table.matrix td:first-child {
  text-align: left; padding-left: 14px;
  font-family: "Noto Sans JP", sans-serif; font-size: 11px; font-weight: 700; white-space: nowrap;
}
table.matrix tr:last-child td { border-bottom: none; }
table.matrix tr.ng-row td { background: var(--accent-bg); }
table.matrix tr.ng-row td:first-child { color: var(--accent); }
.diff-ok { color: var(--ok); font-weight: 700; }
.diff-ng { color: var(--accent); font-weight: 700; }
.sub-kg { display: block; font-size: 9px; color: var(--ink-soft); }

/* ── 受注リスト ── */
.orders { display: flex; flex-direction: column; gap: 8px; }
.order-row {
  background: var(--bg-card); border: 1px solid var(--line-color);
  border-radius: 8px; padding: 10px 14px;
  display: flex; align-items: center; gap: 8px;
}
.order-id { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--ink-soft); flex-shrink: 0; }
.order-name { flex: 1; font-size: 12px; font-weight: 700; }
.order-ch { font-size: 10px; color: var(--ink-soft); background: var(--bg); border: 1px solid var(--line-color); border-radius: 10px; padding: 2px 8px; flex-shrink: 0; }
.order-qty { font-family: "JetBrains Mono", monospace; font-size: 13px; font-weight: 700; color: var(--accent); flex-shrink: 0; }

.empty { text-align: center; padding: 20px; color: var(--ink-soft); font-size: 12px; }

/* ── ローディング ── */
.loading {
  display: none; position: fixed; inset: 0;
  background: rgba(245,241,234,.85);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  z-index: 50; font-size: 13px; color: var(--ink-soft);
}
.loading.show { display: flex; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--line-color); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }

/* ── ボトムリンク ── */
.bottom-nav { margin-top: 28px; text-align: center; }
.bottom-link { font-size: 12px; color: var(--ink-soft); text-decoration: none; }
.bottom-link:hover { color: var(--accent); }

@media (max-width: 375px) {
  .race-val { font-size: 18px; }
  .cn-badge { width: 42px; height: 42px; font-size: 10px; }
  .cn { min-width: 56px; }
}
</style>
</head>
<body>

<div class="header">
  <div class="header-row">
    <div>
      <div class="header-brand">mofmofu 工程管理</div>
      <div class="header-sub">PIPELINE DASHBOARD</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span class="refresh-icon">↻</span>&nbsp;更新
    </button>
  </div>
  <div class="last-updated" id="lastUpdated">読み込み中...</div>
</div>

<div class="content">

  <div id="banner" class="banner ng" style="display:none"></div>

  <div class="sec">商品</div>
  <div class="ptabs" id="ptabs"></div>

  <div class="sec">PIPELINE RACE</div>
  <div class="race">
    <div class="race-card" id="raceBacklog">
      <div class="race-lbl">出 荷 残</div>
      <div class="race-val" id="valBacklog">—</div>
      <div class="race-unit">個</div>
    </div>
    <div class="race-card" id="racePipeline">
      <div class="race-lbl">パイプライン</div>
      <div class="race-val" id="valPipeline">—</div>
      <div class="race-unit">個</div>
    </div>
    <div class="race-card" id="raceDiff">
      <div class="race-lbl">差 分</div>
      <div class="race-val" id="valDiff">—</div>
      <div class="race-unit">個</div>
    </div>
  </div>

  <div class="sec">SUPPLY CHAIN</div>
  <div class="chain-wrap">
    <div class="chain" id="chain"></div>
  </div>

  <div class="sec">SKU MATRIX</div>
  <div class="matrix-wrap">
    <div class="matrix-scroll">
      <table class="matrix">
        <thead>
          <tr>
            <th>SKU</th>
            <th>神木さん</th>
            <th>エルアイシー</th>
            <th>池本さん</th>
            <th>刑務所</th>
            <th>内職</th>
            <th>実在庫</th>
            <th>出荷残</th>
            <th>差分</th>
          </tr>
        </thead>
        <tbody id="matrixBody"></tbody>
      </table>
    </div>
  </div>

  <div class="sec">未出荷の受注</div>
  <div class="orders" id="orders"></div>

  <div class="bottom-nav">
    <a href="./index.html" class="bottom-link">← 入力フォームに戻る</a>
  </div>

</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>データ取得中...</span>
</div>

<script>
const GAS_API_URL = 'YOUR_GAS_WEB_APP_URL_HERE';
const KG_PER_UNIT = 0.030;
const REFRESH_MS = 5 * 60 * 1000;

const MOCK = {
  products: [
    { code: 'tubutubu-babyleg', name: 'つぶつぶベビーレッグ' }
  ],
  skus: [
    { product: 'tubutubu-babyleg', code: 'TBL-KN',  name: 'キナリ' },
    { product: 'tubutubu-babyleg', code: 'TBL-KNT', name: 'キナリツブ' },
    { product: 'tubutubu-babyleg', code: 'TBL-SRT', name: 'シロツブ' },
    { product: 'tubutubu-babyleg', code: 'TBL-CNP', name: 'カラーネップ' },
    { product: 'tubutubu-babyleg', code: 'TBL-MOM', name: '杢オートミール' }
  ],
  snapshot: {
    'TBL-KN':  { '神木さん': 3.0, 'エルアイシー': 100, '池本さん': 30, '刑務所': 20, '内職': 10, '実在庫': 5, backlog: 300 },
    'TBL-KNT': { '神木さん': 0,   'エルアイシー': 0,   '池本さん': 0,  '刑務所': 0,  '内職': 0,  '実在庫': 0, backlog: 50 },
    'TBL-SRT': { '神木さん': 4.5, 'エルアイシー': 50,  '池本さん': 0,  '刑務所': 0,  '内職': 0,  '実在庫': 0, backlog: 80 },
    'TBL-CNP': { '神木さん': 0,   'エルアイシー': 0,   '池本さん': 0,  '刑務所': 0,  '内職': 0,  '実在庫': 0, backlog: 40 },
    'TBL-MOM': { '神木さん': 1.5, 'エルアイシー': 0,   '池本さん': 0,  '刑務所': 0,  '内職': 0,  '実在庫': 0, backlog: 20 }
  },
  orders: [
    { id: 'ORD-001', sku: 'TBL-KN',  skuName: 'キナリ',       unshipped: 80, channel: '楽天' },
    { id: 'ORD-002', sku: 'TBL-SRT', skuName: 'シロツブ',     unshipped: 40, channel: '楽天' },
    { id: 'ORD-003', sku: 'TBL-CNP', skuName: 'カラーネップ', unshipped: 40, channel: 'Amazon' }
  ]
};

let data = null;
let currentProduct = null;
let refreshTimer = null;

function calcPipeline(snap) {
  return Math.floor((snap['神木さん'] || 0) / KG_PER_UNIT)
    + (snap['エルアイシー'] || 0)
    + (snap['池本さん'] || 0)
    + (snap['刑務所'] || 0)
    + (snap['内職'] || 0)
    + (snap['実在庫'] || 0);
}

async function loadData() {
  document.getElementById('refreshBtn').classList.add('refreshing');
  document.getElementById('loading').classList.add('show');
  try {
    if (GAS_API_URL !== 'YOUR_GAS_WEB_APP_URL_HERE') {
      const res = await fetch(GAS_API_URL + '?action=getMasters');
      data = await res.json();
    } else {
      await new Promise(r => setTimeout(r, 400));
      data = MOCK;
    }
  } catch {
    data = MOCK;
  }
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    '最終更新: ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' }) + '　(5分ごと自動更新)';
  if (!currentProduct && data.products.length) currentProduct = data.products[0].code;
  render();
  document.getElementById('refreshBtn').classList.remove('refreshing');
  document.getElementById('loading').classList.remove('show');
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, REFRESH_MS);
}

function render() {
  renderTabs();
  const skus = data.skus.filter(s => s.product === currentProduct);
  renderBanner(skus);
  renderRace(skus);
  renderChain(skus);
  renderMatrix(skus);
  renderOrders(skus);
}

function renderTabs() {
  document.getElementById('ptabs').innerHTML = data.products.map(p =>
    `<button class="ptab${p.code === currentProduct ? ' active' : ''}" onclick="selectProduct('${p.code}')">${p.name}</button>`
  ).join('');
}

function selectProduct(code) {
  currentProduct = code;
  render();
}

function renderBanner(skus) {
  const shortages = skus.filter(s => {
    const snap = data.snapshot[s.code] || {};
    return calcPipeline(snap) < (snap.backlog || 0);
  }).map(s => s.name);
  const el = document.getElementById('banner');
  el.style.display = '';
  if (shortages.length) {
    el.className = 'banner ng';
    el.textContent = '⚠️ 在庫不足 SKU: ' + shortages.join('、');
  } else {
    el.className = 'banner ok';
    el.textContent = '✓ 全 SKU 在庫充足';
  }
}

function renderRace(skus) {
  let totalBacklog = 0, totalPipeline = 0;
  skus.forEach(s => {
    const snap = data.snapshot[s.code] || {};
    totalBacklog += (snap.backlog || 0);
    totalPipeline += calcPipeline(snap);
  });
  const diff = totalPipeline - totalBacklog;
  document.getElementById('valBacklog').textContent = totalBacklog.toLocaleString();
  document.getElementById('valPipeline').textContent = totalPipeline.toLocaleString();
  document.getElementById('valDiff').textContent = (diff >= 0 ? '+' : '') + diff.toLocaleString();
  document.getElementById('raceDiff').className = 'race-card ' + (diff >= 0 ? 'ok' : 'ng');
}

function renderChain(skus) {
  const total = {};
  ['神木さん','エルアイシー','池本さん','刑務所','内職','実在庫'].forEach(n => { total[n] = 0; });
  skus.forEach(s => {
    const snap = data.snapshot[s.code] || {};
    Object.keys(total).forEach(n => { total[n] += (snap[n] || 0); });
  });

  const kg = total['神木さん'];
  const ko = Math.floor(kg / KG_PER_UNIT);
  const kachi = total['池本さん'] + total['刑務所'];

  function node(name, display, hasStock, sub) {
    return `<div class="cn">
      <div class="cn-name">${name}</div>
      <div class="cn-badge${hasStock ? ' has' : ''}">${display}</div>
      <div class="cn-sub">${sub || ''}</div>
    </div>`;
  }
  const ar = '<div class="chain-ar">→</div>';

  document.getElementById('chain').innerHTML =
    node('神木さん',   kg.toFixed(1) + 'kg', kg > 0,     '≈' + ko.toLocaleString() + '個')
    + ar
    + node('エルアイシー', total['エルアイシー'],          total['エルアイシー'] > 0, '個')
    + ar
    + node('加工',     kachi,                             kachi > 0,                 '池本+刑務所')
    + ar
    + node('内職',     total['内職'],                     total['内職'] > 0,         '個')
    + ar
    + node('実在庫',   total['実在庫'],                   total['実在庫'] > 0,       '個');
}

function renderMatrix(skus) {
  document.getElementById('matrixBody').innerHTML = skus.map(s => {
    const snap = data.snapshot[s.code] || {};
    const kg = snap['神木さん'] || 0;
    const ko = Math.floor(kg / KG_PER_UNIT);
    const pl = calcPipeline(snap);
    const bl = snap.backlog || 0;
    const diff = pl - bl;
    const sign = diff >= 0 ? '+' : '';
    return `<tr class="${diff < 0 ? 'ng-row' : ''}">
      <td>${s.code}<br><span style="font-weight:400;color:var(--ink-soft);font-family:inherit;font-size:10px">${s.name}</span></td>
      <td>${kg.toFixed(1)}kg<span class="sub-kg">≈${ko}個</span></td>
      <td>${snap['エルアイシー'] || 0}</td>
      <td>${snap['池本さん'] || 0}</td>
      <td>${snap['刑務所'] || 0}</td>
      <td>${snap['内職'] || 0}</td>
      <td>${snap['実在庫'] || 0}</td>
      <td>${bl}</td>
      <td class="${diff >= 0 ? 'diff-ok' : 'diff-ng'}">${sign}${diff}</td>
    </tr>`;
  }).join('');
}

function renderOrders(skus) {
  const skuCodes = new Set(skus.map(s => s.code));
  const orders = (data.orders || []).filter(o => skuCodes.has(o.sku));
  const el = document.getElementById('orders');
  if (!orders.length) {
    el.innerHTML = '<div class="empty">未出荷の受注はありません</div>';
    return;
  }
  el.innerHTML = orders.map(o =>
    `<div class="order-row">
      <span class="order-id">${o.id}</span>
      <span class="order-name">${o.skuName}</span>
      <span class="order-ch">${o.channel}</span>
      <span class="order-qty">残 ${o.unshipped}個</span>
    </div>`
  ).join('');
}

loadData();
</script>
</body>
</html>

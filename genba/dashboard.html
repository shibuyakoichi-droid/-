<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>工程ダッシュボード — mofmofu</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@500;700&family=Noto+Sans+JP:wght@400;500;700&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f5f1ea;
  --bg-card: #fffdf8;
  --ink: #1a1a1a;
  --ink-soft: #6b6357;
  --line-color: #d4cdbf;
  --accent: #a64635;
  --accent-soft: #c9826f;
  --accent-bg: #fdf3ee;
  --ok: #5a7a3e;
  --ok-bg: #f4f8ec;
  --warn: #b8842a;
  --warn-bg: #fcf6e8;
}

* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

html, body {
  font-family: "Noto Sans JP", sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 14px;
}

/* ── ヘッダー（sticky ブロック全体: タイトル + バナーを一体で固定） ── */
.header {
  background: var(--bg-card);
  border-bottom: 1px solid var(--line-color);
  position: sticky; top: 0; z-index: 30;
}
.header-main {
  padding: 14px 16px 8px;
  display: flex; align-items: center; justify-content: space-between;
}
.header-brand { font-family: "Shippori Mincho", serif; font-size: 17px; font-weight: 700; }
.header-sub { font-family: "JetBrains Mono", monospace; font-size: 10px; color: var(--ink-soft); letter-spacing: .08em; margin-top: 2px; }
.refresh-btn {
  display: flex; align-items: center; gap: 5px;
  background: var(--bg); border: 1px solid var(--line-color);
  border-radius: 20px; padding: 6px 12px;
  font-size: 11px; font-family: inherit; color: var(--ink-soft);
  cursor: pointer; flex-shrink: 0;
}
.refresh-icon { display: inline-block; }
.refreshing .refresh-icon { animation: spin .7s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
.last-updated {
  font-family: "JetBrains Mono", monospace; font-size: 10px;
  color: var(--ink-soft); text-align: right; padding: 0 16px 8px;
}

/* ── 不足バナー（ヘッダー内に含めてスクロールしても見える） ── */
.header-banner {
  padding: 8px 16px; font-size: 12px; font-weight: 700;
  border-top: 1px solid var(--line-color);
}
.header-banner.ok { background: var(--ok-bg);     color: var(--ok); }
.header-banner.ng { background: var(--accent-bg); color: var(--accent); }
.banner-link {
  color: inherit; text-decoration: underline;
  background: none; border: none; padding: 0 2px;
  font-size: inherit; font-weight: inherit; font-family: inherit; cursor: pointer;
}
.banner-link:hover { opacity: .75; }

/* ── コンテンツ ── */
.content { padding: 16px; max-width: 620px; margin: 0 auto; padding-bottom: 48px; }

.sec {
  font-family: "Shippori Mincho", serif; font-size: 12px; font-weight: 700;
  color: var(--ink-soft); letter-spacing: .08em;
  margin: 20px 0 10px; text-transform: uppercase;
}

/* ── 商品タブ ── */
.ptabs { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 2px; scrollbar-width: none; }
.ptabs::-webkit-scrollbar { display: none; }
.ptab {
  padding: 7px 14px; font-size: 12px; font-weight: 700;
  background: var(--bg-card); border: 1px solid var(--line-color);
  border-radius: 20px; cursor: pointer; font-family: inherit;
  color: var(--ink-soft); white-space: nowrap; flex-shrink: 0;
}
.ptab.active { background: var(--accent); border-color: var(--accent); color: #fff; }

/* ── パイプラインレース ── */
.race { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
.race-card {
  background: var(--bg-card); border: 1px solid var(--line-color);
  border-radius: 12px; padding: 14px 8px; text-align: center;
}
.race-card.ok { background: var(--ok-bg);     border-color: var(--ok); }
.race-card.ng { background: var(--accent-bg); border-color: var(--accent-soft); }
.race-lbl  { font-size: 10px; color: var(--ink-soft); margin-bottom: 6px; line-height: 1.4; }
.race-val  { font-family: "JetBrains Mono", monospace; font-size: 22px; font-weight: 700; line-height: 1; }
.race-card.ok .race-val { color: var(--ok); }
.race-card.ng .race-val { color: var(--accent); }
.race-unit { font-size: 9px; color: var(--ink-soft); margin-top: 4px; font-family: "JetBrains Mono", monospace; }

/* ── サプライチェーン ── */
.chain-wrap {
  background: var(--bg-card); border: 1px solid var(--line-color);
  border-radius: 12px; padding: 16px 14px; overflow-x: auto; scrollbar-width: thin;
}
.chain { display: flex; align-items: center; min-width: max-content; }
.cn    { display: flex; flex-direction: column; align-items: center; min-width: 64px; }
.cn-name { font-size: 10px; color: var(--ink-soft); margin-bottom: 5px; white-space: nowrap; }
.cn-badge {
  width: 48px; height: 48px; border-radius: 50%;
  background: var(--bg); border: 2px solid var(--line-color);
  display: flex; align-items: center; justify-content: center;
  font-family: "JetBrains Mono", monospace; font-size: 11px; font-weight: 700;
  text-align: center; line-height: 1.2;
}
.cn-badge.has { background: var(--accent-bg); border-color: var(--accent-soft); color: var(--accent); }
.cn-sub { font-size: 9px; color: var(--ink-soft); margin-top: 4px; font-family: "JetBrains Mono", monospace; min-height: 13px; text-align: center; }
.chain-ar { color: var(--line-color); font-size: 16px; padding: 0 2px; flex-shrink: 0; margin-bottom: 17px; }

/* ── SKUマトリクス ── */
.matrix-wrap { background: var(--bg-card); border: 1px solid var(--line-color); border-radius: 12px; overflow: hidden; }
.matrix-scroll { overflow-x: auto; }
table.matrix { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 860px; }
table.matrix th {
  background: var(--bg); padding: 8px 6px;
  text-align: center; font-size: 10px; color: var(--ink-soft);
  font-weight: 700; border-bottom: 1px solid var(--line-color);
  white-space: nowrap; line-height: 1.4;
}
table.matrix th:first-child { text-align: left; padding-left: 14px; }
table.matrix td {
  padding: 10px 6px; text-align: center;
  border-bottom: 1px solid var(--line-color);
  font-family: "JetBrains Mono", monospace;
}
table.matrix td:first-child {
  text-align: left; padding-left: 14px;
  font-family: "Noto Sans JP", sans-serif; font-size: 11px; font-weight: 700; white-space: nowrap;
}
table.matrix tr:last-child td { border-bottom: none; }
table.matrix tr.ng-row td { background: var(--accent-bg); }
table.matrix tr.ng-row td:first-child { color: var(--accent); }
.diff-ok   { color: var(--ok);     font-weight: 700; }
.diff-ng   { color: var(--accent); font-weight: 700; }
.diff-zero { color: var(--ink-soft); }
.col-total { background: rgba(90,122,62,.06); font-weight: 700; color: var(--ok); }
.ng-row .col-total { background: rgba(166,70,53,.08); color: var(--accent); }
.sub-kg  { display: block; font-size: 9px; color: var(--ink-soft); }
.sku-name { display: block; font-weight: 400; color: var(--ink-soft); font-size: 10px; margin-top: 1px; }
/* sticky ヘッダーの高さ分オフセット（アンカージャンプ時） */
tr[id] { scroll-margin-top: 140px; }

/* ── ローディング ── */
.loading {
  display: none; position: fixed; inset: 0;
  background: rgba(245,241,234,.85);
  align-items: center; justify-content: center;
  flex-direction: column; gap: 12px;
  z-index: 50; font-size: 13px; color: var(--ink-soft);
}
.loading.show { display: flex; }
.spinner { width: 28px; height: 28px; border: 2px solid var(--line-color); border-top-color: var(--accent); border-radius: 50%; animation: spin .8s linear infinite; }

/* ── ボトムリンク ── */
.bottom-nav { margin-top: 28px; text-align: center; }
.bottom-link { font-size: 12px; color: var(--ink-soft); text-decoration: none; }
.bottom-link:hover { color: var(--accent); }

@media (max-width: 375px) {
  .race-val { font-size: 18px; }
  .cn-badge { width: 42px; height: 42px; font-size: 10px; }
  .cn { min-width: 56px; }
  .header-main { padding: 12px 12px 6px; }
}
</style>
</head>
<body>

<!-- ヘッダー（sticky: タイトル + バナーをまとめて固定） -->
<div class="header">
  <div class="header-main">
    <div>
      <div class="header-brand">mofmofu 工程管理</div>
      <div class="header-sub">PIPELINE DASHBOARD</div>
    </div>
    <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
      <span class="refresh-icon">↻</span>&nbsp;更新
    </button>
  </div>
  <div class="last-updated" id="lastUpdated">読み込み中...</div>
  <!-- 不足バナー: ヘッダー内に含まれるため、スクロールしても常に見える -->
  <div class="header-banner" id="bannerInHeader" style="display:none"></div>
</div>

<div class="content">

  <div class="sec">商品</div>
  <div class="ptabs" id="ptabs"></div>

  <div class="sec">PIPELINE RACE</div>
  <div class="race">
    <div class="race-card" id="raceBacklog">
      <div class="race-lbl">出 荷 残</div>
      <div class="race-val" id="valBacklog">—</div>
      <div class="race-unit">個</div>
    </div>
    <div class="race-card" id="racePipeline">
      <div class="race-lbl">工 程 合 計</div>
      <div class="race-val" id="valPipeline">—</div>
      <div class="race-unit">個換算</div>
    </div>
    <div class="race-card" id="raceDiff">
      <div class="race-lbl">差 分</div>
      <div class="race-val" id="valDiff">—</div>
      <div class="race-unit">＋不足 ／ −余裕</div>
    </div>
    <div class="race-card" id="raceTarget">
      <div class="race-lbl">目 標 合 計</div>
      <div class="race-val" id="valTarget">—</div>
      <div class="race-unit">個</div>
    </div>
    <div class="race-card" id="raceTargetDiff">
      <div class="race-lbl">目 標 差 分</div>
      <div class="race-val" id="valTargetDiff">—</div>
      <div class="race-unit">＋不足 ／ −超過</div>
    </div>
  </div>

  <div class="sec">SUPPLY CHAIN</div>
  <div class="chain-wrap">
    <div class="chain" id="chain"></div>
  </div>

  <div class="sec">SKU MATRIX</div>
  <div class="matrix-wrap">
    <div class="matrix-scroll">
      <table class="matrix">
        <thead>
          <tr>
            <th>SKU</th>
            <th>神木さん</th>
            <th>エ社<br>(未縫製)</th>
            <th>池本さん</th>
            <th>刑務所</th>
            <th>エ社<br>(加工前)</th>
            <th>内職</th>
            <th>実在庫</th>
            <th>工程合計<br>(個換算)</th>
            <th>出荷残</th>
            <th>差分</th>
            <th>目標数</th>
            <th>目標差分</th>
          </tr>
        </thead>
        <tbody id="matrixBody"></tbody>
      </table>
    </div>
  </div>

  <div class="bottom-nav">
    <a href="./index.html" class="bottom-link">← 入力フォームに戻る</a>
  </div>

</div>

<div class="loading" id="loading">
  <div class="spinner"></div>
  <span>データ取得中...</span>
</div>

<script>
const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbx9OJmADgkcN_HzcM_GQ7SoH573SFx7rdjj_a8-_Ew3gBCpa66QfvmVD3DUhJBGMcDt/exec';
const KG_PER_PCS  = 0.030; // 1足30g
const REFRESH_MS  = 5 * 60 * 1000;

// フォールバック用モックデータ（GAS未設定・オフライン時に表示）
const MOCK = {
  products: [{ code: 'tubutubu-babyleg', name: 'つぶつぶベビーレッグ' }],
  skus: [
    { product: 'tubutubu-babyleg', code: 'TBL-KN',  name: 'キナリ' },
    { product: 'tubutubu-babyleg', code: 'TBL-KNT', name: 'キナリツブ' },
    { product: 'tubutubu-babyleg', code: 'TBL-SRT', name: 'シロツブ' },
    { product: 'tubutubu-babyleg', code: 'TBL-CNP', name: 'カラーネップ' },
    { product: 'tubutubu-babyleg', code: 'TBL-MOM', name: '杢オートミール' }
  ],
  snapshot: {
    'TBL-KN':  { '神木さん': 3.0, 'エルアイシー(未縫製)': 100, '池本さん': 30, '刑務所': 20, 'エルアイシー(加工前)': 0, '内職': 10, '実在庫': 5,  backlog: 300, target: 4800, kamikiPcs: 100, processTotal: 265, diff: 35   },
    'TBL-KNT': { '神木さん': 0,   'エルアイシー(未縫製)': 0,   '池本さん': 0,  '刑務所': 0,  'エルアイシー(加工前)': 0, '内職': 0,  '実在庫': 0,  backlog: 50,  target: 3200, kamikiPcs: 0,   processTotal: 0,   diff: 50   },
    'TBL-SRT': { '神木さん': 4.5, 'エルアイシー(未縫製)': 50,  '池本さん': 0,  '刑務所': 0,  'エルアイシー(加工前)': 0, '内職': 0,  '実在庫': 0,  backlog: 80,  target: 1600, kamikiPcs: 150, processTotal: 200, diff: -120 },
    'TBL-CNP': { '神木さん': 0,   'エルアイシー(未縫製)': 0,   '池本さん': 0,  '刑務所': 0,  'エルアイシー(加工前)': 0, '内職': 0,  '実在庫': 0,  backlog: 40,  target: 1600, kamikiPcs: 0,   processTotal: 0,   diff: 40   },
    'TBL-MOM': { '神木さん': 1.5, 'エルアイシー(未縫製)': 0,   '池本さん': 0,  '刑務所': 0,  'エルアイシー(加工前)': 0, '内職': 0,  '実在庫': 0,  backlog: 20,  target: 1600, kamikiPcs: 50,  processTotal: 50,  diff: -30  }
  }
};

let data           = null;
let currentProduct = null;
let refreshTimer   = null;

// GASが返す計算済み値を優先、なければクライアント側で計算
function getProcessTotal(snap) {
  if (snap.processTotal != null) return snap.processTotal;
  const kPcs = Math.round((snap['神木さん'] || 0) / KG_PER_PCS);
  return kPcs
    + (snap['エルアイシー(未縫製)'] || 0)
    + (snap['池本さん']             || 0)
    + (snap['刑務所']               || 0)
    + (snap['エルアイシー(加工前)'] || 0)
    + (snap['内職']                 || 0)
    + (snap['実在庫']               || 0);
}

function getDiff(snap) {
  if (snap.diff != null) return snap.diff;
  return (snap.backlog || 0) - getProcessTotal(snap); // 出荷残 - 工程合計（プラス = 不足）
}

// ── データ取得 ──────────────────────────────────────────────
async function loadData() {
  document.getElementById('refreshBtn').classList.add('refreshing');
  document.getElementById('loading').classList.add('show');
  try {
    const res = await fetch(GAS_API_URL + '?action=getMasters');
    data = await res.json();
  } catch {
    data = MOCK;
  }
  const now = new Date();
  document.getElementById('lastUpdated').textContent =
    '最終更新: ' + now.toLocaleTimeString('ja-JP', { hour: '2-digit', minute: '2-digit' })
    + '　(5分ごと自動更新)';
  if (!currentProduct && data.products?.length) currentProduct = data.products[0].code;
  render();
  document.getElementById('refreshBtn').classList.remove('refreshing');
  document.getElementById('loading').classList.remove('show');
  clearTimeout(refreshTimer);
  refreshTimer = setTimeout(loadData, REFRESH_MS);
}

// ── 全セクション描画 ────────────────────────────────────────
function render() {
  renderTabs();
  const skus = (data.skus || []).filter(s => s.product === currentProduct);
  renderBanner(skus);
  renderRace(skus);
  renderChain(skus);
  renderMatrix(skus);
}

function renderTabs() {
  document.getElementById('ptabs').innerHTML = (data.products || []).map(p =>
    `<button class="ptab${p.code === currentProduct ? ' active' : ''}"
       onclick="selectProduct('${p.code}')">${p.name}</button>`
  ).join('');
}

function selectProduct(code) {
  currentProduct = code;
  render();
}

// ── バナー（ヘッダー内固定・不足SKU名クリックで行ジャンプ） ──
function renderBanner(skus) {
  const el       = document.getElementById('bannerInHeader');
  const shortage = skus.filter(s => getDiff(data.snapshot[s.code] || {}) > 0);
  el.style.display = '';
  if (shortage.length) {
    el.className = 'header-banner ng';
    el.innerHTML = '⚠️ 在庫不足: ' +
      shortage.map(s =>
        `<button class="banner-link" onclick="jumpTo('sku-${s.code}')">${s.name}</button>`
      ).join('、');
  } else {
    el.className  = 'header-banner ok';
    el.textContent = '✓ 全 SKU 在庫充足';
  }
}

function jumpTo(id) {
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
}

// ── PIPELINE RACE（出荷残 / 工程合計 / 差分） ─────────────────
function renderRace(skus) {
  let totalBacklog = 0, totalPipeline = 0, totalTarget = 0;
  skus.forEach(s => {
    const snap    = data.snapshot[s.code] || {};
    totalBacklog  += (snap.backlog || 0);
    totalPipeline += getProcessTotal(snap);
    totalTarget   += (snap.target || 0);
  });
  const diff       = totalBacklog - totalPipeline;
  const targetDiff = totalTarget - totalPipeline;
  document.getElementById('valBacklog').textContent    = totalBacklog.toLocaleString();
  document.getElementById('valPipeline').textContent   = totalPipeline.toLocaleString();
  document.getElementById('valDiff').textContent       = (diff > 0 ? '+' : '') + diff.toLocaleString();
  document.getElementById('raceDiff').className        = 'race-card ' + (diff > 0 ? 'ng' : 'ok');
  document.getElementById('valTarget').textContent     = totalTarget > 0 ? totalTarget.toLocaleString() : '未設定';
  document.getElementById('valTargetDiff').textContent = totalTarget > 0 ? (targetDiff > 0 ? '+' : '') + targetDiff.toLocaleString() : '—';
  document.getElementById('raceTargetDiff').className  = 'race-card ' + (totalTarget > 0 ? (targetDiff > 0 ? 'ng' : 'ok') : '');
}

// ── SUPPLY CHAIN（拠点別合計フロー） ───────────────────────
function renderChain(skus) {
  let totalKg = 0;
  const totals = { 'エルアイシー(未縫製)': 0, '池本さん': 0, '刑務所': 0, 'エルアイシー(加工前)': 0, '内職': 0, '実在庫': 0 };
  skus.forEach(s => {
    const snap = data.snapshot[s.code] || {};
    totalKg += (snap['神木さん'] || 0);
    Object.keys(totals).forEach(k => { totals[k] += (snap[k] || 0); });
  });
  const totalKo = Math.round(totalKg / KG_PER_PCS);
  const kachi   = totals['池本さん'] + totals['刑務所'];

  const node = (name, display, hasStock, sub) =>
    `<div class="cn">
      <div class="cn-name">${name}</div>
      <div class="cn-badge${hasStock ? ' has' : ''}">${display}</div>
      <div class="cn-sub">${sub || ''}</div>
    </div>`;
  const ar = '<div class="chain-ar">→</div>';

  document.getElementById('chain').innerHTML =
    node('神木さん',      totalKg.toFixed(1) + 'kg',             totalKg > 0,                        '≈' + totalKo.toLocaleString() + '個')
    + ar
    + node('エ社(未縫製)', totals['エルアイシー(未縫製)'],        totals['エルアイシー(未縫製)'] > 0, '個')
    + ar
    + node('加工',         kachi,                                 kachi > 0,                          '池本+刑務所')
    + ar
    + node('エ社(加工前)', totals['エルアイシー(加工前)'],        totals['エルアイシー(加工前)'] > 0, '個')
    + ar
    + node('内職',         totals['内職'],                        totals['内職'] > 0,                 '個')
    + ar
    + node('実在庫',       totals['実在庫'],                      totals['実在庫'] > 0,               '個');
}

// ── SKU MATRIX ────────────────────────────────────────────
function renderMatrix(skus) {
  document.getElementById('matrixBody').innerHTML = skus.map(s => {
    const snap   = data.snapshot[s.code] || {};
    const kg     = snap['神木さん'] || 0;
    const kPcs   = snap.kamikiPcs != null ? snap.kamikiPcs : Math.round(kg / KG_PER_PCS);
    const pt     = getProcessTotal(snap);
    const bl     = snap.backlog || 0;
    const diff   = getDiff(snap);
    const sign   = diff > 0 ? '+' : '';
    const diffCls = diff > 0 ? 'diff-ng' : diff < 0 ? 'diff-ok' : 'diff-zero';

    const target     = snap.target || 0;
    const targetDiff = target > 0 ? target - pt : null;
    const tDiffCls   = targetDiff == null ? 'diff-zero' : targetDiff > 0 ? 'diff-ng' : targetDiff < 0 ? 'diff-ok' : 'diff-zero';

    return `<tr id="sku-${s.code}" class="${diff > 0 ? 'ng-row' : ''}">
      <td>${s.code}<span class="sku-name">${s.name}</span></td>
      <td>${kg.toFixed(1)}kg<span class="sub-kg">≈${kPcs}個</span></td>
      <td>${snap['エルアイシー(未縫製)'] || 0}</td>
      <td>${snap['池本さん']             || 0}</td>
      <td>${snap['刑務所']               || 0}</td>
      <td>${snap['エルアイシー(加工前)'] || 0}</td>
      <td>${snap['内職']                 || 0}</td>
      <td>${snap['実在庫']               || 0}</td>
      <td class="col-total">${pt}</td>
      <td>${bl}</td>
      <td class="${diffCls}">${sign}${diff}</td>
      <td>${target > 0 ? target.toLocaleString() : '—'}</td>
      <td class="${tDiffCls}">${targetDiff != null ? (targetDiff > 0 ? '+' : '') + targetDiff : '—'}</td>
    </tr>`;
  }).join('');
}

loadData();
</script>
</body>
</html>

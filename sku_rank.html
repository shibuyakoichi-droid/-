  document.querySelectorAll('select.gross').forEach(function(sel) {
    var sku = sel.getAttribute('data-sku');
    if (grossMap[sku]) {
      sel.value = grossMap[sku];
      sel.className = 'gross set';
      var tr = sel.parentElement.parentElement;
      var ovCell = tr.querySelector('td:last-child');
      var r = null;
      for (var i = 0; i < rows.length; i++) { if (rows[i].sku === sku) { r = rows[i]; break; } }
      if (r) ovCell.innerHTML = overallBadge(calcOverall(r.srank, r.yrank, grossMap[sku]));
    }
  });
  updateOverallChart();
}

// 総合評価スコア: 売上A=3,B=2,C=1,D=0 / 昨対A=3,B=2,C=1,D=0,新商品=2 / 粗利A=3,B=2,C=1,D=0
// 合計 8-9=S / 6-7=A / 4-5=B / 2-3=C / 0-1=D
var SC = {A:3, B:2, C:1, D:0};
var YC = {A:3, B:2, C:1, D:0};
YC['新商品'] = 2;

function calcOverall(srank, yrank, grank) {
  if (!grank) return null;
  var s = (SC[srank] || 0) + (YC[yrank] || 0) + (SC[grank] || 0);
  if (s >= 8) return 'S';
  if (s >= 6) return 'A';
  if (s >= 4) return 'B';
  if (s >= 2) return 'C';
  return 'D';
}

function overallBadge(ov) {
  if (!ov) return '<span style="color:#bbb;font-size:.72rem">&#8722;</span>';
  return '<span class="badge ' + ov + '">' + ov + '</span>';
}

// サマリー
var yoy_all = ((D.tt - D.tl) / D.tl * 100).toFixed(1);
var summaryData = [
  ['総SKU数', rows.length],
  ['昨対比較可能', D.wl],
  ['新商品（昨年なし）', D.np],
  ['今年総売上', '&yen;' + D.tt.toLocaleString()],
  ['昨対比（全体）', yoy_all + '%']
];
var summaryHTML = '';
for (var i = 0; i < summaryData.length; i++) {
  summaryHTML += '<div class="card"><div class="label">' + summaryData[i][0] + '</div><div class="value">' + summaryData[i][1] + '</div></div>';
}
document.getElementById('summary').innerHTML = summaryHTML;

// バーチャート
function renderChart(id, data, order) {
  var max = 0;
  for (var k = 0; k < order.length; k++) { if ((data[order[k]] || 0) > max) max = data[order[k]] || 0; }
  if (max === 0) { document.getElementById(id).innerHTML = '<p style="color:#aaa;font-size:.78rem">データなし</p>'; return; }
  var html = '';
  for (var j = 0; j < order.length; j++) {
    var key = order[j];
    var v = data[key] || 0;
    var pct = Math.round(v / max * 100);
    html += '<div class="bar-group">' +
      '<div class="bar-label"><span class="badge ' + key + '">' + key + '</span></div>' +
      '<div class="bar-track"><div class="bar-fill fill-' + key + '" style="width:' + pct + '%">' + v + '</div></div>' +
      '<div class="bar-count">' + v + '件</div></div>';
  }
  document.getElementById(id).innerHTML = html;
}
renderChart('cs', D.dist_s, ['A','B','C','D']);
renderChart('cy', D.dist_y, ['A','B','C','D','新商品']);

function updateOverallChart() {
  var gc = {};
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var ov = calcOverall(r.srank, r.yrank, grossMap[r.sku]);
    if (ov) gc[ov] = (gc[ov] || 0) + 1;
  }
  renderChart('cg', gc, ['S','A','B','C','D']);
}
updateOverallChart();

// テーブル描画
function render() {
  var fs = document.getElementById('fs').value;
  var fy = document.getElementById('fy').value;
  var fg = document.getElementById('fg').value;
  var fq = document.getElementById('fq').value.toLowerCase();

  var filtered = [];
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var ov = calcOverall(r.srank, r.yrank, grossMap[r.sku]);
    var ovKey = ov || 'none';
    var nameMatch = r.sku.toLowerCase().indexOf(fq) >= 0 || r.name.toLowerCase().indexOf(fq) >= 0;
    if ((!fs || r.srank === fs) && (!fy || r.yrank === fy) && (!fg || ovKey === fg) && (!fq || nameMatch)) {
      filtered.push(r);
    }
  }

  document.getElementById('ci').textContent = '表示: ' + filtered.length + ' / ' + rows.length + ' 件';

  var tbody = '';
  for (var j = 0; j < filtered.length; j++) {
    var r = filtered[j];
    var thisStr = '&yen;' + r.this.toLocaleString();
    var lastStr = r.last != null ? '&yen;' + r.last.toLocaleString() : '&minus;';
    var yoyStr  = r.yoy != null ? (r.yoy >= 0 ? '+' : '') + r.yoy + '%' : '&minus;';
    var yc = r.yoy != null ? (r.yoy >= 0 ? 'yp' : 'ym') : '';
    var nm = r.name.length > 30 ? r.name.substring(0, 30) + '…' : r.name;
    var gv = grossMap[r.sku] || '';
    var ov = calcOverall(r.srank, r.yrank, gv);
    var selCls = gv ? 'gross set' : 'gross';
    var rowId = 'row_' + j;

    tbody += '<tr id="' + rowId + '">' +
      '<td class="ctr">' + r.rank + '</td>' +
      '<td style="white-space:nowrap">' + r.sku + '</td>' +
      '<td class="name-cell" title="' + r.name.replace(/"/g,'&quot;') + '">' + nm + '</td>' +
      '<td class="num">' + thisStr + '</td>' +
      '<td class="num">' + lastStr + '</td>' +
      '<td class="ctr"><span class="badge ' + r.srank + '">' + r.srank + '</span></td>' +
      '<td class="ctr ' + yc + '">' + yoyStr + '</td>' +
      '<td class="ctr"><span class="badge ' + r.yrank + '">' + r.yrank + '</span></td>' +
      '<td class="ctr"><select class="' + selCls + '" data-sku="' + r.sku + '" onchange="setGross(this)">' +
        '<option value="">&#8722;</option>' +
        '<option value="A"' + (gv==='A'?' selected':'') + '>A</option>' +
        '<option value="B"' + (gv==='B'?' selected':'') + '>B</option>' +
        '<option value="C"' + (gv==='C'?' selected':'') + '>C</option>' +
        '<option value="D"' + (gv==='D'?' selected':'') + '>D</option>' +
      '</select></td>' +
      '<td class="ctr" id="ov_' + rowId + '">' + overallBadge(ov) + '</td>' +
    '</tr>';
  }
  document.getElementById('tb').innerHTML = tbody;
}

function setGross(sel) {
  var sku = sel.getAttribute('data-sku');
  var val = sel.value;
  grossMap[sku] = val;
  sel.className = val ? 'gross set' : 'gross';
  // この行の総合評価セルを更新
  var tr = sel.parentElement.parentElement;
  var ovCell = tr.querySelector('td:last-child');
  var r = null;
  for (var i = 0; i < rows.length; i++) { if (rows[i].sku === sku) { r = rows[i]; break; } }
  if (r) ovCell.innerHTML = overallBadge(calcOverall(r.srank, r.yrank, val));
  updateOverallChart();
}

function downloadCSV() {
  var header = '品番,商品名,今年売上,去年売上,売上順位,売上ランク,昨対増減率,昨対ランク,粗利ランク,総合評価\n';
  var lines = '';
  for (var i = 0; i < rows.length; i++) {
    var r = rows[i];
    var gv = grossMap[r.sku] || '';
    var ov = calcOverall(r.srank, r.yrank, gv) || '';
    lines += '"' + r.sku + '",' +
      '"' + r.name.replace(/"/g,'""') + '",' +
      r.this + ',' +
      (r.last != null ? r.last : '') + ',' +
      r.rank + ',' + r.srank + ',' +
      (r.yoy != null ? r.yoy : '') + ',' +
      r.yrank + ',' + gv + ',' + ov + '\n';
  }
  var csv = '﻿' + header + lines;
  var a = document.createElement('a');
  a.href = URL.createObjectURL(new Blob([csv], {type:'text/csv'}));
  a.download = 'SKU運用ランク_入力済み.csv';
  a.click();
}

document.getElementById('fs').addEventListener('change', render);
document.getElementById('fy').addEventListener('change', render);
document.getElementById('fg').addEventListener('change', render);
document.getElementById('fq').addEventListener('input', render);
render(); loadGrossRanks();
</script>
</body>

<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>月次サマリー 自動計算ツール</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Hiragino Kaku Gothic ProN','Noto Sans JP','Meiryo',sans-serif;
  background: #f8fafc; color: #1e293b; padding: 32px 20px; min-height: 100vh;
  font-size: 14px;
}
.container { max-width: 860px; margin: 0 auto; }

/* Header */
.header { margin-bottom: 28px; }
.header-label { font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .15em; margin-bottom: 4px; }
h1 { font-size: 22px; font-weight: 800; color: #0f172a; letter-spacing: -.02em; }
.header-sub { font-size: 12px; color: #94a3b8; margin-top: 4px; }

/* Period inputs */
.period-row { display: flex; gap: 12px; margin-bottom: 24px; align-items: center; flex-wrap: wrap; }
.period-row label { font-size: 12px; color: #64748b; font-weight: 600; }
.period-row input[type=text] {
  padding: 6px 12px; border: 1.5px solid #e2e8f0; border-radius: 8px;
  font-size: 13px; width: 140px; background: #fff;
  font-family: inherit;
}
.period-row input[type=text]:focus { outline: none; border-color: #6366f1; }

/* Section */
.section { background: #fff; border-radius: 16px; margin-bottom: 20px; overflow: hidden; box-shadow: 0 1px 4px rgba(0,0,0,.06); }
.section-head {
  display: flex; align-items: center; justify-content: space-between;
  padding: 14px 20px; background: #1e293b; cursor: pointer;
  user-select: none;
}
.section-head h2 { font-size: 13px; font-weight: 700; color: #fff; letter-spacing: .05em; }
.section-head .toggle { color: #94a3b8; font-size: 12px; }

/* Table */
table { width: 100%; border-collapse: collapse; }
thead tr { background: #f8fafc; border-bottom: 2px solid #e2e8f0; }
th { padding: 9px 16px; font-size: 11px; font-weight: 700; color: #64748b; letter-spacing: .06em; text-align: left; white-space: nowrap; }
th.num { text-align: right; }
tbody tr { border-bottom: 1px solid #f1f5f9; transition: background .1s; }
tbody tr:hover { background: #f8fafc; }
tbody tr.total-row { background: #f0fdf4; border-top: 2px solid #bbf7d0; font-weight: 700; }
tbody tr.total-row td { font-weight: 700; }
tbody tr.calc-row { background: #fafafa; }
tbody tr.section-row td { font-weight: 700; color: #0f172a; }
td { padding: 9px 16px; vertical-align: middle; }
td.label { font-weight: 500; color: #334155; min-width: 160px; }
td.label.indent { padding-left: 32px; color: #64748b; font-weight: 400; }
td.num { text-align: right; font-variant-numeric: tabular-nums; }

/* Input cells */
.num-input {
  width: 130px; padding: 5px 10px; border: 1.5px solid #e2e8f0; border-radius: 6px;
  font-size: 13px; text-align: right; background: #fff; font-family: inherit;
  font-variant-numeric: tabular-nums; transition: border-color .15s;
}
.num-input:focus { outline: none; border-color: #6366f1; background: #fafafe; }
.num-input.pct { width: 80px; }
.num-input.small { width: 100px; }

/* Calculated values */
.calc { color: #0f172a; font-weight: 600; }
.calc.muted { color: #94a3b8; }

/* Diff / YoY badges */
.diff-pos { color: #16a34a; font-weight: 600; }
.diff-neg { color: #dc2626; font-weight: 600; }
.diff-zero { color: #94a3b8; }
.yoy-pos { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:700; background:#d1fae5; color:#065f46; }
.yoy-neg { display:inline-flex; align-items:center; padding:2px 8px; border-radius:999px; font-size:12px; font-weight:700; background:#fee2e2; color:#991b1b; }
.yoy-zero { color:#94a3b8; font-size:12px; }
.yoy-na { color:#cbd5e1; font-size:12px; }

/* Add row button */
.add-row-btn {
  display: flex; align-items: center; gap: 6px; padding: 10px 20px;
  font-size: 12px; color: #94a3b8; background: none; border: none; cursor: pointer;
  border-top: 1px solid #f1f5f9; width: 100%; text-align: left; transition: color .15s;
  font-family: inherit;
}
.add-row-btn:hover { color: #6366f1; }

/* Delete row */
.del-btn { background: none; border: none; cursor: pointer; color: #cbd5e1; font-size: 14px; padding: 0 4px; transition: color .15s; }
.del-btn:hover { color: #dc2626; }

/* Print / export */
.actions { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
.btn {
  padding: 8px 18px; border-radius: 8px; border: none; cursor: pointer;
  font-size: 13px; font-weight: 700; font-family: inherit; transition: all .15s;
}
.btn-primary { background: #6366f1; color: #fff; }
.btn-primary:hover { background: #4f46e5; }
.btn-secondary { background: #fff; color: #64748b; border: 1.5px solid #e2e8f0; }
.btn-secondary:hover { border-color: #94a3b8; }

/* Print styles */
@media print {
  body { background: #fff; padding: 0; }
  .actions, .add-row-btn, .del-btn, .period-row { display: none !important; }
  .num-input { border: none; background: transparent; }
  .section { box-shadow: none; border: 1px solid #e2e8f0; }
}
</style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-label">楽天RMS ／ 月次レポート</div>
    <h1>月次サマリー 自動計算ツール</h1>
    <div class="header-sub">数字を入力すると差分・昨対・各種率が自動計算されます</div>
  </div>

  <div class="period-row">
    <label>今年期間：</label>
    <input type="text" id="periodCurr" value="2026年03月" oninput="recalc()" />
    <label>前年期間：</label>
    <input type="text" id="periodPrev" value="2025年03月" oninput="recalc()" />
  </div>

  <div class="actions">
    <button class="btn btn-primary" onclick="window.print()">🖨 印刷 / PDF保存</button>
    <button class="btn btn-secondary" onclick="resetAll()">🔄 リセット</button>
  </div>

  <!-- ■ サマリー -->
  <div class="section">
    <div class="section-head" onclick="toggleSection('summary')">
      <h2>■ サマリー（今年／前年／★差分／昨対）</h2>
      <span class="toggle" id="summary-toggle">▲</span>
    </div>
    <div id="summary-body">
    <table>
      <thead>
        <tr>
          <th>項目</th>
          <th class="num" id="th-curr">今年</th>
          <th class="num" id="th-prev">前年</th>
          <th class="num">★差分</th>
          <th class="num">昨対</th>
        </tr>
      </thead>
      <tbody>
        <!-- 売上 -->
        <tr>
          <td class="label">売上</td>
          <td class="num"><input class="num-input" id="sales-curr" type="text" placeholder="0" oninput="fmt(this);recalc()" /></td>
          <td class="num"><input class="num-input" id="sales-prev" type="text" placeholder="0" oninput="fmt(this);recalc()" /></td>
          <td class="num calc" id="sales-diff">―</td>
          <td class="num" id="sales-yoy">―</td>
        </tr>
        <!-- アフィリエイト売上 -->
        <tr>
          <td class="label">アフィリエイト売上</td>
          <td class="num"><input class="num-input" id="aff-curr" type="text" placeholder="0" oninput="fmt(this);recalc()" /></td>
          <td class="num"><input class="num-input" id="aff-prev" type="text" placeholder="0" oninput="fmt(this);recalc()" /></td>
          <td class="num calc" id="aff-diff">―</td>
          <td class="num" id="aff-yoy">―</td>
        </tr>
        <!-- 原価率 -->
        <tr class="calc-row">
          <td class="label">原価率</td>
          <td class="num">
            <input class="num-input pct" id="cogsr-curr" type="text" placeholder="0.0" oninput="recalc()" />
            <span style="color:#94a3b8;font-size:12px;">%</span>
          </td>
          <td class="num">
            <input class="num-input pct" id="cogsr-prev" type="text" placeholder="0.0" oninput="recalc()" />
            <span style="color:#94a3b8;font-size:12px;">%</span>
          </td>
          <td class="num calc" id="cogsr-diff">―</td>
          <td class="num" id="cogsr-yoy">―</td>
        </tr>
        <!-- 粗利 -->
        <tr class="calc-row">
          <td class="label" style="color:#64748b;">粗利（売上 × (1−原価率)）</td>
          <td class="num calc" id="gross-curr">―</td>
          <td class="num calc" id="gross-prev">―</td>
          <td class="num calc" id="gross-diff">―</td>
          <td class="num" id="gross-yoy">―</td>
        </tr>
        <!-- 販促費合計（自動計算） -->
        <tr class="calc-row">
          <td class="label" style="color:#64748b;">販促費合計（自動集計）</td>
          <td class="num calc" id="promo-total-curr">―</td>
          <td class="num calc" id="promo-total-prev">―</td>
          <td class="num calc" id="promo-total-diff">―</td>
          <td class="num" id="promo-total-yoy">―</td>
        </tr>
        <!-- 販促費率 -->
        <tr class="calc-row">
          <td class="label" style="color:#64748b;">販促費率</td>
          <td class="num calc" id="promoR-curr">―</td>
          <td class="num calc" id="promoR-prev">―</td>
          <td class="num calc" id="promoR-diff">―</td>
          <td class="num" id="promoR-yoy">―</td>
        </tr>
        <!-- アフィリエイト費用比率 -->
        <tr class="calc-row">
          <td class="label" style="color:#64748b;">アフィリエイト費用比率</td>
          <td class="num calc" id="affR-curr">―</td>
          <td class="num calc" id="affR-prev">―</td>
          <td class="num calc" id="affR-diff">―</td>
          <td class="num" id="affR-yoy">―</td>
        </tr>
        <!-- 粗利－販促費 -->
        <tr class="total-row">
          <td class="label">粗利 － 販促費</td>
          <td class="num calc" id="net-curr">―</td>
          <td class="num calc" id="net-prev">―</td>
          <td class="num calc" id="net-diff">―</td>
          <td class="num" id="net-yoy">―</td>
        </tr>
      </tbody>
    </table>
    </div>
  </div>

  <!-- ■ 販促費内訳 -->
  <div class="section">
    <div class="section-head" onclick="toggleSection('promo')">
      <h2>■ 販促費内訳</h2>
      <span class="toggle" id="promo-toggle">▲</span>
    </div>
    <div id="promo-body">
    <table>
      <thead>
        <tr>
          <th>項目</th>
          <th class="num" id="th2-curr">今年</th>
          <th class="num" id="th2-prev">前年</th>
          <th class="num">★差分</th>
          <th class="num">昨対</th>
          <th></th>
        </tr>
      </thead>
      <tbody id="promo-rows">
        <!-- rows injected by JS -->
      </tbody>
      <tfoot>
        <tr class="total-row">
          <td class="label">販促費合計</td>
          <td class="num calc" id="ptotal-curr">―</td>
          <td class="num calc" id="ptotal-prev">―</td>
          <td class="num calc" id="ptotal-diff">―</td>
          <td class="num" id="ptotal-yoy">―</td>
          <td></td>
        </tr>
      </tfoot>
    </table>
    <button class="add-row-btn" onclick="addPromoRow()">＋ 項目を追加</button>
    </div>
  </div>

  <!-- ■ メモ -->
  <div class="section">
    <div class="section-head" onclick="toggleSection('memo')">
      <h2>■ メモ・所感</h2>
      <span class="toggle" id="memo-toggle">▲</span>
    </div>
    <div id="memo-body" style="padding:16px 20px;">
      <textarea id="memoText" style="width:100%;height:120px;border:1.5px solid #e2e8f0;border-radius:8px;padding:10px 12px;font-family:inherit;font-size:13px;resize:vertical;outline:none;line-height:1.7;" placeholder="今月の振り返り、来月の施策など..."></textarea>
    </div>
  </div>

</div>

<script>
// Default promo items
const defaultPromoItems = [
  { name: 'クーポン' },
  { name: 'ポイント' },
  { name: '広告' },
  { name: 'アフィリエイト費用' },
  { name: 'ROOM' },
  { name: 'インスタ広告' },
];
let promoItems = [...defaultPromoItems];

function initPromoRows() {
  promoItems.forEach((item, i) => addPromoRowDOM(item.name, i));
  recalc();
}

function addPromoRow() {
  const name = prompt('項目名を入力してください');
  if (!name) return;
  const i = promoItems.length;
  promoItems.push({ name });
  addPromoRowDOM(name, i);
  recalc();
}

function addPromoRowDOM(name, i) {
  const tbody = document.getElementById('promo-rows');
  const tr = document.createElement('tr');
  tr.id = `promo-row-${i}`;
  tr.innerHTML = `
    <td class="label indent">${name}</td>
    <td class="num"><input class="num-input small" id="p${i}-curr" type="text" placeholder="0" oninput="fmt(this);recalc()" /></td>
    <td class="num"><input class="num-input small" id="p${i}-prev" type="text" placeholder="0" oninput="fmt(this);recalc()" /></td>
    <td class="num calc" id="p${i}-diff">―</td>
    <td class="num" id="p${i}-yoy">―</td>
    <td><button class="del-btn" onclick="delPromoRow(${i})" title="削除">✕</button></td>
  `;
  tbody.appendChild(tr);
}

function delPromoRow(i) {
  const tr = document.getElementById(`promo-row-${i}`);
  if (tr) tr.remove();
  promoItems[i] = null;
  recalc();
}

// --- Number formatting ---
function parseNum(id) {
  const el = document.getElementById(id);
  if (!el) return 0;
  return parseFloat(el.value.replace(/,/g, '').replace(/[¥￥]/g, '')) || 0;
}
function parsePct(id) {
  const el = document.getElementById(id);
  if (!el) return null;
  const v = parseFloat(el.value);
  return isNaN(v) ? null : v;
}
function fmt(el) {
  const raw = el.value.replace(/,/g, '').replace(/[¥￥]/g, '');
  const n = parseFloat(raw);
  if (!isNaN(n) && raw !== '') el.value = Math.round(n).toLocaleString();
}

function setCalc(id, val, isYen = true) {
  const el = document.getElementById(id);
  if (!el) return;
  if (val === null) { el.textContent = '―'; el.className = 'calc muted'; return; }
  el.className = 'calc';
  el.textContent = isYen ? fmtYen(val) : fmtPct(val) + '%';
}

function fmtYen(n) {
  if (n === 0) return '0';
  return n.toLocaleString();
}
function fmtPct(n) {
  return (n >= 0 ? '' : '') + n.toFixed(1);
}

function setDiff(id, diff, isYen = true, isPt = false) {
  const el = document.getElementById(id);
  if (!el || diff === null) { if (el) { el.innerHTML = '―'; el.className = 'num calc'; } return; }
  const cls = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : 'diff-zero';
  const prefix = diff > 0 ? '★+' : '★';
  if (isPt) {
    el.innerHTML = `<span class="${cls}">${prefix}${diff.toFixed(1)}pt</span>`;
  } else if (isYen) {
    el.innerHTML = `<span class="${cls}">${prefix}${diff.toLocaleString()}</span>`;
  } else {
    el.innerHTML = `<span class="${cls}">${prefix}${diff.toFixed(1)}%</span>`;
  }
}

function setYoY(id, curr, prev, isPt = false) {
  const el = document.getElementById(id);
  if (!el) return;
  if (!prev || prev === 0) { el.innerHTML = '<span class="yoy-na">―</span>'; return; }
  if (isPt) {
    const diff = curr - prev;
    const cls = diff > 0 ? 'diff-pos' : diff < 0 ? 'diff-neg' : 'diff-zero';
    el.innerHTML = `<span class="${cls}">${diff >= 0 ? '+' : ''}${diff.toFixed(1)}pt</span>`;
    return;
  }
  const pct = ((curr - prev) / Math.abs(prev)) * 100;
  const n = pct.toFixed(1);
  if (pct > 0) el.innerHTML = `<span class="yoy-pos">▲${n}%</span>`;
  else if (pct < 0) el.innerHTML = `<span class="yoy-neg">▼${Math.abs(n)}%</span>`;
  else el.innerHTML = `<span class="yoy-zero">±0%</span>`;
}

// --- Main recalc ---
function recalc() {
  // Update period labels
  const cy = document.getElementById('periodCurr').value || '今年';
  const py = document.getElementById('periodPrev').value || '前年';
  ['th-curr','th2-curr'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=cy; });
  ['th-prev','th2-prev'].forEach(id => { const el=document.getElementById(id); if(el) el.textContent=py; });

  const salesC = parseNum('sales-curr');
  const salesP = parseNum('sales-prev');
  const affC   = parseNum('aff-curr');
  const affP   = parseNum('aff-prev');
  const cogsRC = parsePct('cogsr-curr');
  const cogsRP = parsePct('cogsr-prev');

  // 売上 diff/yoy
  setDiff('sales-diff', salesC - salesP);
  setYoY('sales-yoy', salesC, salesP);

  // アフィリエイト売上
  setDiff('aff-diff', affC - affP);
  setYoY('aff-yoy', affC, affP);

  // 原価率 diff (pt)
  if (cogsRC !== null && cogsRP !== null) {
    setDiff('cogsr-diff', cogsRC - cogsRP, false, true);
    setYoY('cogsr-yoy', cogsRC, cogsRP, true);
  } else {
    document.getElementById('cogsr-diff').innerHTML = '―';
    document.getElementById('cogsr-yoy').innerHTML = '<span class="yoy-na">―</span>';
  }

  // 粗利
  const grossC = (cogsRC !== null && salesC) ? salesC * (1 - cogsRC / 100) : null;
  const grossP = (cogsRP !== null && salesP) ? salesP * (1 - cogsRP / 100) : null;
  setCalc('gross-curr', grossC !== null ? Math.round(grossC) : null);
  setCalc('gross-prev', grossP !== null ? Math.round(grossP) : null);
  if (grossC !== null && grossP !== null) {
    setDiff('gross-diff', Math.round(grossC - grossP));
    setYoY('gross-yoy', grossC, grossP);
  } else {
    document.getElementById('gross-diff').innerHTML = '―';
    document.getElementById('gross-yoy').innerHTML = '<span class="yoy-na">―</span>';
  }

  // 販促費集計
  let promoC = 0, promoP = 0;
  promoItems.forEach((item, i) => {
    if (!item) return;
    const c = parseNum(`p${i}-curr`);
    const p = parseNum(`p${i}-prev`);
    promoC += c;
    promoP += p;
    setDiff(`p${i}-diff`, c - p);
    setYoY(`p${i}-yoy`, c, p);
  });

  // 販促費合計
  const ptCurrEl = document.getElementById('ptotal-curr');
  const ptPrevEl = document.getElementById('ptotal-prev');
  if (ptCurrEl) ptCurrEl.textContent = promoC.toLocaleString();
  if (ptPrevEl) ptPrevEl.textContent = promoP.toLocaleString();
  setDiff('ptotal-diff', promoC - promoP);
  setYoY('ptotal-yoy', promoC, promoP);

  // サマリーの販促費
  const pc1 = document.getElementById('promo-total-curr');
  const pp1 = document.getElementById('promo-total-prev');
  if (pc1) pc1.textContent = promoC.toLocaleString();
  if (pp1) pp1.textContent = promoP.toLocaleString();
  setDiff('promo-total-diff', promoC - promoP);
  setYoY('promo-total-yoy', promoC, promoP);

  // 販促費率
  const promoRC = salesC ? (promoC / salesC * 100) : null;
  const promoRP = salesP ? (promoP / salesP * 100) : null;
  const pc2 = document.getElementById('promoR-curr');
  const pp2 = document.getElementById('promoR-prev');
  if (pc2) pc2.textContent = promoRC !== null ? promoRC.toFixed(1) + '%' : '―';
  if (pp2) pp2.textContent = promoRP !== null ? promoRP.toFixed(1) + '%' : '―';
  if (promoRC !== null && promoRP !== null) {
    setDiff('promoR-diff', promoRC - promoRP, false, true);
    setYoY('promoR-yoy', promoRC, promoRP, true);
  } else {
    document.getElementById('promoR-diff').innerHTML = '―';
    document.getElementById('promoR-yoy').innerHTML = '<span class="yoy-na">―</span>';
  }

  // アフィリエイト費用比率（アフィリエイト費用 / 売上）
  // Find affiliate cost row
  const affCostIdx = promoItems.findIndex(it => it && it.name.includes('アフィリエイト費用'));
  let affCostC = 0, affCostP = 0;
  if (affCostIdx >= 0) {
    affCostC = parseNum(`p${affCostIdx}-curr`);
    affCostP = parseNum(`p${affCostIdx}-prev`);
  }
  const affRC = salesC ? (affCostC / salesC * 100) : null;
  const affRP = salesP ? (affCostP / salesP * 100) : null;
  const ac = document.getElementById('affR-curr');
  const ap = document.getElementById('affR-prev');
  if (ac) ac.textContent = affRC !== null ? affRC.toFixed(1) + '%' : '―';
  if (ap) ap.textContent = affRP !== null ? affRP.toFixed(1) + '%' : '―';
  if (affRC !== null && affRP !== null) {
    setDiff('affR-diff', affRC - affRP, false, true);
    setYoY('affR-yoy', affRC, affRP, true);
  } else {
    document.getElementById('affR-diff').innerHTML = '―';
    document.getElementById('affR-yoy').innerHTML = '<span class="yoy-na">―</span>';
  }

  // 粗利 - 販促費
  const netC = (grossC !== null) ? Math.round(grossC) - promoC : null;
  const netP = (grossP !== null) ? Math.round(grossP) - promoP : null;
  const nc = document.getElementById('net-curr');
  const np = document.getElementById('net-prev');
  if (nc) nc.textContent = netC !== null ? netC.toLocaleString() : '―';
  if (np) np.textContent = netP !== null ? netP.toLocaleString() : '―';
  if (netC !== null && netP !== null) {
    setDiff('net-diff', netC - netP);
    setYoY('net-yoy', netC, netP);
  } else {
    document.getElementById('net-diff').innerHTML = '―';
    document.getElementById('net-yoy').innerHTML = '<span class="yoy-na">―</span>';
  }
}

function toggleSection(id) {
  const body = document.getElementById(id + '-body');
  const toggle = document.getElementById(id + '-toggle');
  if (body.style.display === 'none') { body.style.display = ''; toggle.textContent = '▲'; }
  else { body.style.display = 'none'; toggle.textContent = '▼'; }
}

function resetAll() {
  if (!confirm('入力した数値をすべてリセットしますか？')) return;
  document.querySelectorAll('.num-input').forEach(el => el.value = '');
  document.getElementById('memoText').value = '';
  recalc();
}

// Init
initPromoRows();
</script>
</body>

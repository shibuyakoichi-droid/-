<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>デイリーチェック — SOWAN</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
:root{--bg:#f5f4f0;--card:#fff;--border:#e8e6e0;--border-s:#d8d5cf;--ink:#1a1a1a;--muted:#888;--faint:#bbb;--green:#0a6b50;--green-bg:#e1f5ee;--amber:#b86a00;--amber-bg:#fef9ee;--red:#a32d2d;--red-bg:#fcebeb;--blue:#1a5fa0;--blue-bg:#e6f1fb;--r:10px}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'Helvetica Neue',Arial,'Hiragino Kaku Gothic ProN',sans-serif;font-size:14px;color:var(--ink);background:var(--bg);min-height:100vh}
.topbar{background:var(--card);border-bottom:1px solid var(--border);padding:0 24px;display:flex;align-items:center;justify-content:space-between;height:56px;position:sticky;top:0;z-index:100}
.topbar-title{font-size:15px;font-weight:600}
.topbar-sub{font-size:11px;color:var(--muted);margin-top:2px}
.topbar-right{display:flex;gap:8px;align-items:center}
.container{max-width:860px;margin:0 auto;padding:20px 16px 60px}
.btn{padding:7px 14px;border:1px solid var(--border-s);border-radius:8px;font-size:13px;cursor:pointer;background:var(--card);color:var(--ink);font-family:inherit;transition:background .12s}
.btn:hover{background:var(--bg)}
.btn.primary{background:var(--ink);color:#fff;border-color:var(--ink)}
.btn.primary:hover{background:#333}
.btn.sm{padding:4px 10px;font-size:12px}
.btn.danger{color:var(--red);border-color:#f0c0c0}
.btn.danger:hover{background:var(--red-bg)}
.date-nav{display:flex;align-items:center;gap:8px;background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:6px 8px;margin-bottom:16px}
.date-nav .btn{border:none;background:none;padding:4px 10px}
.date-label{flex:1;text-align:center;font-size:15px;font-weight:600}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:20px}
.stat{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:12px 14px;text-align:center}
.stat-label{font-size:11px;color:var(--muted);margin-bottom:4px}
.stat-value{font-size:22px;font-weight:700}
.stat-value.green{color:var(--green)}
.stat-value.amber{color:var(--amber)}
.stat-value.red{color:var(--red)}
.staff-card{background:var(--card);border:1px solid var(--border);border-radius:var(--r);margin-bottom:14px;overflow:hidden}
.staff-head{display:flex;align-items:center;gap:10px;padding:14px 16px;border-bottom:1px solid var(--border)}
.avatar{width:32px;height:32px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;flex-shrink:0}
.staff-name{font-size:14px;font-weight:600}
.staff-sub{font-size:12px;color:var(--muted)}
.progress-bar{flex:1;height:5px;background:#f0ede8;border-radius:3px;margin:0 12px}
.progress-fill{height:100%;border-radius:3px;background:var(--green);transition:width .3s}
.pct-label{font-size:12px;color:var(--muted);min-width:32px;text-align:right}
.task-section{padding:8px 12px}
.section-divider{display:flex;align-items:center;gap:8px;padding:6px 4px;margin:4px 0 2px}
.section-divider-line{flex:1;height:1px;background:var(--border)}
.section-divider-label{font-size:10px;font-weight:700;color:var(--muted);letter-spacing:.08em;white-space:nowrap}
.task-row{display:flex;align-items:center;gap:10px;padding:9px 10px;border-radius:8px;cursor:pointer;user-select:none;transition:background .1s}
.task-row:hover{background:#f5f4f0}
.task-row.done{background:var(--green-bg)}
.task-row.done .task-name{text-decoration:line-through;color:var(--muted)}
.task-row.overdue{background:var(--red-bg)}
.task-row.overdue .task-name{color:var(--red)}
.task-row input[type=checkbox]{width:16px;height:16px;cursor:pointer;accent-color:var(--green);flex-shrink:0}
.task-name{flex:1;font-size:13px}
.task-time{font-size:11px;color:var(--muted);white-space:nowrap;display:flex;align-items:center;gap:4px}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px;font-weight:600}
.badge.checkin{background:var(--blue-bg);color:var(--blue)}
.badge.checkout{background:var(--amber-bg);color:var(--amber)}
.badge.overdue{background:var(--red-bg);color:var(--red)}
.badge.monthly{background:#f3eafd;color:#6b2fa0}
.history{background:var(--card);border:1px solid var(--border);border-radius:var(--r);padding:16px 18px;margin-top:20px}
.history h2{font-size:14px;font-weight:600;margin-bottom:12px;color:var(--muted)}
.heatmap{display:grid;gap:3px;font-size:11px}
.heat-date{text-align:center;color:var(--faint);font-size:10px}
.heat-label{color:var(--muted);font-size:12px;align-self:center;padding-right:4px}
.heat-cell{height:18px;border-radius:3px;background:#ececea}
.heat-cell.today{outline:2px solid var(--ink)}
.legend{display:flex;align-items:center;gap:6px;margin-top:10px;font-size:11px;color:var(--muted)}
.legend-cell{width:14px;height:14px;border-radius:3px}
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);display:none;align-items:flex-start;justify-content:center;z-index:200;overflow-y:auto;padding:24px 16px}
.overlay.open{display:flex}
.modal{background:var(--card);border-radius:14px;width:100%;max-width:520px;padding:24px;box-shadow:0 10px 40px rgba(0,0,0,.15)}
.modal h2{font-size:16px;font-weight:600;margin-bottom:16px}
.field{margin-bottom:12px}
.field label{display:block;font-size:12px;color:var(--muted);margin-bottom:4px}
.field input,.field select{width:100%;padding:8px 10px;border:1px solid var(--border-s);border-radius:8px;font-family:inherit;font-size:13px;background:var(--card)}
.field-row{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.weekday-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
.weekday-grid label{display:flex;align-items:center;justify-content:center;padding:6px 0;border:1px solid var(--border-s);border-radius:8px;font-size:12px;cursor:pointer}
.weekday-grid input{display:none}
.weekday-grid label:has(input:checked){background:var(--green-bg);border-color:var(--green)}
.modal-foot{display:flex;justify-content:flex-end;gap:8px;margin-top:16px;padding-top:16px;border-top:1px solid var(--border)}
.manage-list{display:flex;flex-direction:column;gap:6px;max-height:45vh;overflow-y:auto;margin-bottom:12px}
.manage-item{display:flex;align-items:center;gap:8px;padding:8px 10px;background:var(--bg);border-radius:8px}
.manage-item .name{flex:1;font-size:13px}
.manage-item .sub{font-size:11px;color:var(--muted)}
.empty{text-align:center;padding:28px;color:var(--faint);font-size:13px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid #e0e0e0;border-top-color:#555;border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
@media(max-width:600px){.summary{grid-template-columns:repeat(2,1fr)}}
</style>
</head>
<body>
<div class="topbar">
  <div>
    <div class="topbar-title">✓ デイリーチェック</div>
    <div class="topbar-sub">SOWAN — 日次タスク管理</div>
  </div>
  <div class="topbar-right">
    <span id="syncStatus" style="font-size:11px;color:var(--muted)"></span>
    <button class="btn sm" onclick="openTaskModal()">⚙ タスク管理</button>
    <button class="btn sm" onclick="openStaffModal()">👥 スタッフ</button>
    <a href="top.html" class="btn sm" style="text-decoration:none">↩ ポータル</a>
  </div>
</div>

<div class="container">
  <div class="date-nav">
    <button class="btn" onclick="changeDate(-1)">◀</button>
    <div class="date-label" id="dateLabel"></div>
    <button class="btn" onclick="changeDate(1)">▶</button>
    <button class="btn sm" onclick="goToday()">今日</button>
  </div>
  <div class="summary">
    <div class="stat"><div class="stat-label">全タスク</div><div class="stat-value" id="sTotal">—</div></div>
    <div class="stat"><div class="stat-label">完了</div><div class="stat-value green" id="sDone">—</div></div>
    <div class="stat"><div class="stat-label">残り</div><div class="stat-value amber" id="sTodo">—</div></div>
    <div class="stat"><div class="stat-label">遅延</div><div class="stat-value red" id="sOver">—</div></div>
  </div>
  <div id="staffArea"><div class="empty"><span class="spinner"></span> 読み込み中…</div></div>
  <div class="history">
    <h2>過去14日の達成率</h2>
    <div id="heatmap" class="heatmap"></div>
    <div class="legend">
      <span>低</span>
      <span class="legend-cell" style="background:#ececea"></span>
      <span class="legend-cell" style="background:#9fe1cb"></span>
      <span class="legend-cell" style="background:#5dcaa5"></span>
      <span class="legend-cell" style="background:#1d9e75"></span>
      <span class="legend-cell" style="background:#0a6b50"></span>
      <span>高</span>
    </div>
  </div>
</div>

<!-- タスク管理 -->
<div class="overlay" id="taskOverlay" onclick="closeOv(event,'taskOverlay')">
  <div class="modal">
    <h2>⚙ タスク管理</h2>
    <div class="field"><label>タスク名 *</label><input id="t-name" placeholder="例：発注書入力"></div>
    <div class="field-row">
      <div class="field"><label>担当者 *</label><select id="t-staff"></select></div>
      <div class="field"><label>タイミング</label>
        <select id="t-timing">
          <option value="work">通常業務</option>
          <option value="checkin">出勤時</option>
          <option value="checkout">退勤時</option>
        </select>
      </div>
    </div>
    <div class="field-row">
      <div class="field"><label>繰り返し</label>
        <select id="t-pattern" onchange="onPatternChange()">
          <option value="daily">毎日</option>
          <option value="weekday">平日のみ</option>
          <option value="weekly">曜日指定</option>
          <option value="monthly-start">月初（1〜3日）</option>
          <option value="monthly-end">月末（最終3日）</option>
        </select>
      </div>
    </div>
    <div class="field" id="weekdayField" style="display:none">
      <label>曜日を選択</label>
      <div class="weekday-grid">
        <label><input type="checkbox" value="1"><span>月</span></label>
        <label><input type="checkbox" value="2"><span>火</span></label>
        <label><input type="checkbox" value="3"><span>水</span></label>
        <label><input type="checkbox" value="4"><span>木</span></label>
        <label><input type="checkbox" value="5"><span>金</span></label>
        <label><input type="checkbox" value="6"><span>土</span></label>
        <label><input type="checkbox" value="0"><span>日</span></label>
      </div>
    </div>
    <button class="btn primary" onclick="addTask()" style="margin-bottom:16px">＋ タスクを追加</button>
    <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">登録済みタスク</div>
    <div class="manage-list" id="taskList"></div>
    <div class="modal-foot"><button class="btn" onclick="closeOv(null,'taskOverlay')">閉じる</button></div>
  </div>
</div>

<!-- スタッフ管理 -->
<div class="overlay" id="staffOverlay" onclick="closeOv(event,'staffOverlay')">
  <div class="modal">
    <h2>👥 スタッフ管理</h2>
    <div class="field-row">
      <div class="field"><label>氏名 *</label><input id="s-name" placeholder="例：田中"></div>
      <div class="field"><label>役割</label><input id="s-role" placeholder="例：発注・生産"></div>
    </div>
    <button class="btn primary" onclick="addStaff()" style="margin-bottom:16px">＋ スタッフを追加</button>
    <div style="font-size:12px;font-weight:600;color:var(--muted);margin-bottom:8px">登録済みスタッフ</div>
    <div class="manage-list" id="staffList"></div>
    <div class="modal-foot"><button class="btn" onclick="closeOv(null,'staffOverlay')">閉じる</button></div>
  </div>
</div>

<script>
const SB_URL='https://yukcdqnnevomhdcpsvms.supabase.co';
const SB_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inl1a2NkcW5uZXZvbWhkY3Bzdm1zIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY0Mjc2MTUsImV4cCI6MjA5MjAwMzYxNX0.XBSc2kQNwR_bleSwrfYZD8l0fbKTbL1Z3S7ewEtSkDc';
const sb=supabase.createClient(SB_URL,SB_KEY);

const COLORS=[
  {bg:'#e6f1fb',fg:'#0c447c'},{bg:'#e1f5ee',fg:'#085041'},
  {bg:'#faeeda',fg:'#633806'},{bg:'#fbeaf0',fg:'#72243e'},
  {bg:'#eeedfe',fg:'#3c3489'},{bg:'#faece7',fg:'#712b13'},
];

let cur=new Date();cur.setHours(0,0,0,0);
let staff=[],tasks=[],logs={};

function p2(n){return String(n).padStart(2,'0');}
function fmtKey(d){return`${d.getFullYear()}-${p2(d.getMonth()+1)}-${p2(d.getDate())}`;}
function fmtJa(d){const w=['日','月','火','水','木','金','土'][d.getDay()];return`${d.getFullYear()}年${d.getMonth()+1}月${d.getDate()}日（${w}）`;}
function esc(s){return String(s||'').replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function setSyncStatus(msg,color='var(--muted)'){const el=document.getElementById('syncStatus');el.textContent=msg;el.style.color=color;}

async function init(){
  setSyncStatus('読み込み中…');
  const[r1,r2]=await Promise.all([
    sb.from('dc_staff').select('*').order('sort_order'),
    sb.from('dc_tasks').select('*').eq('active',true).order('sort_order'),
  ]);
  if(r1.error||r2.error){setSyncStatus('読み込みエラー','var(--red)');return;}
  staff=r1.data||[];
  tasks=r2.data||[];
  await loadLogs(cur);
  setSyncStatus('');
  render();
}

async function loadLogs(date){
  // 過去14日分まとめて取得
  const from=new Date(date);from.setDate(from.getDate()-13);
  const {data}=await sb.from('dc_logs').select('*').gte('date',fmtKey(from)).lte('date',fmtKey(date));
  logs={};
  (data||[]).forEach(l=>{
    if(!logs[l.date])logs[l.date]={};
    logs[l.date][l.task_id]=l;
  });
}

function getCheck(date,taskId){const k=fmtKey(date);return logs[k]&&logs[k][taskId];}

async function toggle(date,taskId){
  const k=fmtKey(date);
  const existing=getCheck(date,taskId);
  if(existing){
    await sb.from('dc_logs').delete().eq('id',existing.id);
    if(logs[k])delete logs[k][taskId];
  } else {
    const id=`${k}_${taskId}`;
    const now=new Date().toISOString();
    const {data}=await sb.from('dc_logs').upsert({id,date:k,task_id:taskId,checked_at:now}).select().single();
    if(!logs[k])logs[k]={};
    if(data)logs[k][taskId]=data;
  }
  render();
}

function onDate(task,date){
  const dow=date.getDay(),dom=date.getDate();
  const last=new Date(date.getFullYear(),date.getMonth()+1,0).getDate();
  const wd=JSON.parse(task.weekdays||'[]');
  switch(task.pattern){
    case'daily':return true;
    case'weekday':return dow>=1&&dow<=5;
    case'weekly':return wd.includes(dow);
    case'monthly-start':return dom<=3;
    case'monthly-end':return dom>=last-2;
  }return false;
}
function tasksFor(date){return tasks.filter(t=>onDate(t,date));}
function patternLabel(t){
  const wm=['日','月','火','水','木','金','土'];
  switch(t.pattern){
    case'daily':return'毎日';case'weekday':return'平日';
    case'weekly':return JSON.parse(t.weekdays||'[]').map(w=>wm[w]).join('・');
    case'monthly-start':return'月初';case'monthly-end':return'月末';
  }return'';
}
function isOverdue(date,taskId){
  const today=new Date();today.setHours(0,0,0,0);
  return date<today&&!getCheck(date,taskId);
}

function render(){
  document.getElementById('dateLabel').textContent=fmtJa(cur);
  const todayTasks=tasksFor(cur);
  let totDone=0,totOver=0;
  const byStaff={};
  staff.forEach(s=>byStaff[s.id]=[]);
  todayTasks.forEach(t=>{if(!byStaff[t.staff_id])byStaff[t.staff_id]=[];byStaff[t.staff_id].push(t);});

  const area=document.getElementById('staffArea');
  area.innerHTML='';
  if(!todayTasks.length){area.innerHTML='<div class="empty">この日に対象タスクはありません</div>';return;}

  staff.forEach(s=>{
    const my=byStaff[s.id]||[];
    if(!my.length)return;
    const checkin=my.filter(t=>t.timing==='checkin');
    const work=my.filter(t=>t.timing==='work');
    const checkout=my.filter(t=>t.timing==='checkout');
    const done=my.filter(t=>getCheck(cur,t.id)).length;
    totDone+=done;
    my.forEach(t=>{if(isOverdue(cur,t.id))totOver++;});
    const pct=Math.round(done/my.length*100);
    const c=COLORS[s.color%COLORS.length];

    const card=document.createElement('div');
    card.className='staff-card';
    card.innerHTML=`
      <div class="staff-head">
        <div class="avatar" style="background:${c.bg};color:${c.fg}">${esc(s.name.charAt(0))}</div>
        <div style="flex:1">
          <div class="staff-name">${esc(s.name)}</div>
          <div class="staff-sub">${esc(s.role||'')} &nbsp; ${done}/${my.length} 完了</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
        <div class="pct-label">${pct}%</div>
      </div>
      <div class="task-section" id="ts-${s.id}"></div>`;
    area.appendChild(card);
    const sec=document.getElementById('ts-'+s.id);

    const addSec=(label,items,badgeClass)=>{
      if(!items.length)return;
      sec.innerHTML+=`<div class="section-divider"><div class="section-divider-line"></div><div class="section-divider-label">${label}</div><div class="section-divider-line"></div></div>`;
      items.forEach(t=>sec.appendChild(makeRow(t,badgeClass)));
    };
    addSec('出勤時',checkin,'checkin');
    addSec('業務',work,'');
    addSec('退勤時',checkout,'checkout');
  });

  document.getElementById('sTotal').textContent=todayTasks.length;
  document.getElementById('sDone').textContent=totDone;
  document.getElementById('sTodo').textContent=todayTasks.length-totDone;
  document.getElementById('sOver').textContent=totOver;
  renderHeatmap();
}

function makeRow(t,badgeClass){
  const check=getCheck(cur,t.id);
  const overdue=isOverdue(cur,t.id);
  const div=document.createElement('div');
  div.className='task-row'+(check?' done':'')+(overdue?' overdue':'');
  let right='';
  if(badgeClass)right+=`<span class="badge ${badgeClass}">${badgeClass==='checkin'?'出勤':'退勤'}</span>`;
  if(check){
    const d=new Date(check.checked_at);
    right+=`<span>${p2(d.getHours())}:${p2(d.getMinutes())}</span>`;
  } else if(overdue){
    right+=`<span class="badge overdue">遅延</span>`;
  } else if(t.pattern==='monthly-start'||t.pattern==='monthly-end'){
    right+=`<span class="badge monthly">${patternLabel(t)}</span>`;
  } else {
    right+=`<span>—</span>`;
  }
  div.innerHTML=`
    <input type="checkbox" ${check?'checked':''}>
    <span class="task-name">${esc(t.name)}</span>
    <span class="task-time">${right}</span>`;
  div.addEventListener('click',e=>{if(e.target.tagName!=='INPUT')toggle(cur,t.id);});
  div.querySelector('input').addEventListener('click',()=>toggle(cur,t.id));
  return div;
}

function renderHeatmap(){
  const days=14,today=new Date();today.setHours(0,0,0,0);
  const hc=['#ececea','#9fe1cb','#5dcaa5','#1d9e75','#0a6b50'];
  const hm=document.getElementById('heatmap');
  hm.style.gridTemplateColumns=`44px repeat(${days},1fr)`;
  hm.innerHTML='';
  hm.appendChild(document.createElement('div'));
  for(let i=days-1;i>=0;i--){
    const d=new Date(today);d.setDate(d.getDate()-i);
    const c=document.createElement('div');c.className='heat-date';
    c.textContent=d.getDate();if(i===0)c.style.fontWeight='600';
    hm.appendChild(c);
  }
  staff.forEach(s=>{
    const lbl=document.createElement('div');lbl.className='heat-label';lbl.textContent=s.name;hm.appendChild(lbl);
    for(let i=days-1;i>=0;i--){
      const d=new Date(today);d.setDate(d.getDate()-i);
      const my=tasksFor(d).filter(t=>t.staff_id===s.id);
      let idx=0;
      if(my.length){
        const done=my.filter(t=>getCheck(d,t.id)).length;
        const p=done/my.length;
        idx=p>=1?4:p>=.75?3:p>=.5?2:p>0?1:0;
      }
      const cell=document.createElement('div');
      cell.className='heat-cell'+(i===0?' today':'');
      cell.style.background=hc[idx];
      hm.appendChild(cell);
    }
  });
}

function changeDate(d){cur.setDate(cur.getDate()+d);render();}
function goToday(){cur=new Date();cur.setHours(0,0,0,0);render();}

// タスク管理
function openTaskModal(){
  document.getElementById('t-staff').innerHTML=staff.map(s=>`<option value="${s.id}">${esc(s.name)}</option>`).join('');
  refreshTaskList();
  document.getElementById('taskOverlay').classList.add('open');
}
function onPatternChange(){
  document.getElementById('weekdayField').style.display=document.getElementById('t-pattern').value==='weekly'?'':'none';
}
async function addTask(){
  const name=document.getElementById('t-name').value.trim();
  if(!name){alert('タスク名を入力してください');return;}
  const staff_id=document.getElementById('t-staff').value;
  const timing=document.getElementById('t-timing').value;
  const pattern=document.getElementById('t-pattern').value;
  let weekdays=[];
  if(pattern==='weekly'){
    weekdays=Array.from(document.querySelectorAll('.weekday-grid input:checked')).map(e=>parseInt(e.value));
    if(!weekdays.length){alert('曜日を選んでください');return;}
  }
  const maxOrder=tasks.filter(t=>t.staff_id===staff_id).reduce((m,t)=>Math.max(m,t.sort_order||0),-1);
  const newTask={id:'t'+Date.now(),name,staff_id,timing,pattern,weekdays:JSON.stringify(weekdays),active:true,sort_order:maxOrder+1};
  const{error}=await sb.from('dc_tasks').insert(newTask);
  if(error){alert('追加に失敗しました');return;}
  tasks.push(newTask);
  document.getElementById('t-name').value='';
  document.querySelectorAll('.weekday-grid input').forEach(e=>e.checked=false);
  refreshTaskList();render();
}
function refreshTaskList(){
  const el=document.getElementById('taskList');
  const tl={checkin:'出勤時',work:'業務',checkout:'退勤時'};
  if(!tasks.length){el.innerHTML='<div class="empty">タスクがありません</div>';return;}
  el.innerHTML=tasks.map(t=>{
    const s=staff.find(x=>x.id===t.staff_id);
    return`<div class="manage-item">
      <div class="name">${esc(t.name)}</div>
      <div class="sub">${s?esc(s.name):'?'} · ${tl[t.timing]||''} · ${patternLabel(t)}</div>
      <button class="btn sm danger" onclick="delTask('${t.id}')">削除</button>
    </div>`;
  }).join('');
}
async function delTask(id){
  if(!confirm('削除しますか？'))return;
  await sb.from('dc_tasks').update({active:false}).eq('id',id);
  tasks=tasks.filter(t=>t.id!==id);
  refreshTaskList();render();
}

// スタッフ管理
function openStaffModal(){refreshStaffList();document.getElementById('staffOverlay').classList.add('open');}
async function addStaff(){
  const name=document.getElementById('s-name').value.trim();
  if(!name){alert('氏名を入力してください');return;}
  const newStaff={id:'s'+Date.now(),name,role:document.getElementById('s-role').value.trim(),color:staff.length,sort_order:staff.length};
  const{error}=await sb.from('dc_staff').insert(newStaff);
  if(error){alert('追加に失敗しました');return;}
  staff.push(newStaff);
  document.getElementById('s-name').value='';document.getElementById('s-role').value='';
  refreshStaffList();render();
}
function refreshStaffList(){
  const el=document.getElementById('staffList');
  if(!staff.length){el.innerHTML='<div class="empty">スタッフがいません</div>';return;}
  el.innerHTML=staff.map(s=>`<div class="manage-item">
    <div class="name">${esc(s.name)}</div>
    <div class="sub">${esc(s.role||'')}</div>
    <button class="btn sm danger" onclick="delStaff('${s.id}')">削除</button>
  </div>`).join('');
}
async function delStaff(id){
  if(!confirm('このスタッフとそのタスクを削除しますか？'))return;
  await sb.from('dc_staff').delete().eq('id',id);
  staff=staff.filter(s=>s.id!==id);
  tasks=tasks.filter(t=>t.staff_id!==id);
  refreshStaffList();render();
}

function closeOv(e,id){if(!e||e.target===document.getElementById(id))document.getElementById(id).classList.remove('open');}

init();
</script>
</body>
